<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Quiz Seite der Faulen Arbeitstiere</title>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel:ELSH@61.8&display=swap" rel="stylesheet">
    </head>
    <body>
    <div id="main-content">
        <h1 id="index_html_head_1"><img id="index_html_img_1" src="f32209c0-e396-4e9b-8774-4197303c54ff.png" alt="HTML5 Icon">Willkommen auf der Quizseite der Faulen Arbeitstiere!</h1>
        <p><a href="quiz.html" class="quiz-link">Hier</a> geht es zur ersten Quizfrage!</p>
        <button id="start-music">Musik starten</button>
        <div id="server-info"></div>
        <div id="index-bestenliste"></div>
    </div>
    <audio id="bg-music" loop>
        <source src="hintergrundmusik.opus" type="audio/ogg">
        Ihr Browser unterstuetzt das Audio-Element nicht.
    </audio>

    <script>
        document.getElementById('start-music').addEventListener('click', function() {
            var btn = document.getElementById('start-music');
            var audio = document.getElementById('bg-music');
            if (audio.paused) {
                audio.volume = 1.0;
                audio.play().catch(function(error) {
                    console.log("Autoplay wurde vom Browser blockiert:", error);
                });
                btn.textContent = 'Musik pausieren';
            } else {
                audio.pause();
                btn.textContent = 'Musik starten';
            }
        });

        fetch("/api/serverinfo")
        .then(function(r) { return r.json(); })
        .then(function(info) {
            document.getElementById("server-info").innerHTML =
                '<p style="margin-top:20px;">Server-Adresse im lokalen Netzwerk: <strong>http://' + info.ip + ':' + info.port + '</strong></p>';
        }).catch(function() {});

        fetch("/api/leaderboard")
        .then(function(r) { return r.json(); })
        .then(function(daten) {
            if (!daten.length) {
                document.getElementById("index-bestenliste").innerHTML = "<h3>Bestenliste</h3><p><em>Noch keine Eintraege.</em></p>";
                return;
            }
            var html = "<h3>Bestenliste</h3><table class='leaderboard'><tr><th>#</th><th>Name</th><th>Punkte</th><th>%</th><th>Zeit</th></tr>";
            for (var i = 0; i < daten.length; i++) {
                var row = daten[i];
                var cls = i === 0 ? "gold" : i === 1 ? "silber" : i === 2 ? "bronze" : "";
                html += "<tr class='" + cls + "'><td>" + (i+1) + "</td><td>" + row.name + "</td><td>" + row.punkte + "/" + row.max + "</td><td>" + row.prozent + "%</td><td>" + row.zeit + "</td></tr>";
            }
            html += "</table>";
            document.getElementById("index-bestenliste").innerHTML = html;
        }).catch(function() {});
    </script>
    </body>
</html>
