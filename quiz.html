let aktuelleFrage = 0;
let punkte = 0;



function zeigeFrage(){


let q = fragen[aktuelleFrage];


document.getElementById("frageNummer").innerHTML =
"Frage " + (aktuelleFrage+1) + " von " + fragen.length;


document.getElementById("frage").innerHTML =
q.frage;



let ausgabe="";


q.antworten.forEach((antwort,index)=>{


ausgabe += `

<label class="antwort">

<input type="radio" name="antwort" value="${index}">

${antwort}

</label>

`;

});


document.getElementById("antworten").innerHTML=ausgabe;


document.getElementById("ergebnis").innerHTML="";


document.getElementById("balken").style.width =
((aktuelleFrage / fragen.length)*100)+"%";


}




function pruefen(){


let auswahl =
document.querySelector(
'input[name="antwort"]:checked'
);


let ergebnis =
document.getElementById("ergebnis");


if(!auswahl){

ergebnis.className="falsch";
ergebnis.innerHTML="Bitte zuerst eine Antwort auswählen.";
return;

}



if(Number(auswahl.value)===fragen[aktuelleFrage].richtig){

punkte++;

ergebnis.className="richtig";

ergebnis.innerHTML=
"✅ Richtig! "+fragen[aktuelleFrage].erklaerung;


}else{


ergebnis.className="falsch";

ergebnis.innerHTML=
"❌ Falsch! "+fragen[aktuelleFrage].erklaerung;


}



setTimeout(()=>{


aktuelleFrage++;


if(aktuelleFrage < fragen.length){

zeigeFrage();


}else{


document.querySelector(".container").innerHTML=`

<div id="ende">

<h1>🎉 Quiz beendet!</h1>

<h2>Dein Ergebnis</h2>

<h3>${punkte} von ${fragen.length} richtig</h3>

<h2>${Math.round((punkte/fragen.length)*100)}%</h2>


<button onclick="location.reload()">

Quiz neu starten

</button>

</div>

`;


}


},1200);


}



zeigeFrage();


</script>
