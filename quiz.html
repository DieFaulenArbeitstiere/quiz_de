<script>
const fragen = [
{frage:"Wofuer steht die Abkuerzung LAN?",antworten:["Local Area Network","Local Access Network","Long Area Network","Large Access Network"],richtig:0,erklaerung:"LAN steht fuer Local Area Network und bezeichnet ein lokales Netzwerk, das Geraete in einem begrenzten Bereich wie einem Buerohaushalt oder Schulgebaeude verbindet."},
{frage:"Wofuer steht die Abkuerzung WLAN?",antworten:["Wireless Local Area Network","Wide Local Area Network","Wired Local Area Network","Wireless Long Access Network"],richtig:0,erklaerung:"WLAN steht fuer Wireless Local Area Network. Es verbindet Geraete kabellos ueber Funksignale, typically im 2,4-GHz- oder 5-GHz-Band."},
{frage:"Was beschreibt ein WAN?",antworten:["Ein lokales Netzwerk fuer ein Zimmer","Ein Netzwerk nur fuer Drucker","Ein Netzwerk, das grosse geografische Entfernungen ueberbrueckt","Ein Netzwerk nur ueber WLAN"],richtig:2,erklaerung:"Ein WAN (Wide Area Network) verbindet Netzwerke ueber grosse Entfernungen, z.B. zwischen Staedten oder Laendern. Das Internet ist das groesste WAN."},
{frage:"Was ist der wichtigste Unterschied zwischen LAN und WLAN?",antworten:["LAN ist immer schneller","LAN verwendet Kabel, WLAN verwendet Funk","WLAN benoetigt keinen Router","LAN funktioniert nur im Ausland"],richtig:1,erklaerung:"LAN verwendet physische Kabel (z.B. Ethernet), WLAN verbindet Geraete kabellos ueber Funk. Beide koennen aehnliche Geschwindigkeiten erreichen."},
{frage:"Welche Hauptaufgabe hat ein Router?",antworten:["Dateien speichern","Verschiedene Netzwerke miteinander verbinden, z.B. LAN mit Internet","Programme installieren","Viren entfernen"],richtig:1,erklaerung:"Ein Router verbindet verschiedene Netzwerke miteinander und leitet Datenpakete weiter. Im Heimgebrauch verbindet er das lokale LAN/WLAN mit dem Internet."},
{frage:"Welche Aufgabe erfuellt ein Switch?",antworten:["WLAN bereitzustellen","Mehrere Geraete innerhalb eines LAN zu verbinden","Viren zu entfernen","Das Internet zu verschluesseln"],richtig:1,erklaerung:"Ein Switch verbindet mehrere Geraete innerhalb eines lokalen Netzwerks und leitet Daten gezielt an den richtigen Empfaenger weiter, im Gegensatz zu einem Hub, der an alle sendet."},
{frage:"Wozu dient ein Access Point?",antworten:["Zum Bereitstellen eines WLANs in einem bestimmten Bereich","Zum Drucken von Dokumenten","Zum Speichern von Dateien","Zum Erstellen von Backups"],richtig:0,erklaerung:"Ein Access Point stellt eine drahtlose Netzwerkverbindung in einem bestimmten Bereich bereit. In grossen Gebaeuden werden mehrere Access Points eingesetzt, um das WLAN vollstaendig abzudecken."},
{frage:"Wozu dient eine IP-Adresse?",antworten:["Zur eindeutigen Identifikation eines Geraets in einem Netzwerk","Zur Verschluesselung von Dateien","Zum Speichern von Daten","Zur Erhoehung der Internetgeschwindigkeit"],richtig:0,erklaerung:"Eine IP-Adresse ist die eindeutige Adresse eines Geraets in einem Netzwerk. Sie ermoeglicht das gezielte Senden und Empfangen von Daten, aehnlich einer Postadresse."},
{frage:"Was ist der Unterschied zwischen IPv4 und IPv6?",antworten:["Es gibt keinen Unterschied","IPv4 ist neuer als IPv6","IPv6 funktioniert nur ueber WLAN","IPv6 verwendet laengere Adressen und bietet mehr Adressen als IPv4"],richtig:3,erklaerung:"IPv4 verwendet 32-Bit-Adressen (ca. 4,3 Milliarden Adressen), IPv6 verwendet 128-Bit-Adressen (ca. 340 Sextillionen Dauch IPv6 eingefuehrt, weil die IPv4-Adressen knapp wurden."},
{frage:"Welche Rolle uebernimmt ein Server?",antworten:["Er bietet Dienste und Ressourcen fuer andere Geraete an","Er nutzt Dienste von anderen","Er ersetzt den Router","Er schuetzt automatisch vor Viren"],richtig:0,erklaerung:"Ein Server stellt Dienste und Ressourcen fuer Clients bereit, z.B. Webseiten, Dateispeicherung, E-Mail oder Datenbanken. Er laeuft meistens durchgehend und ist fuer viele Nutzer zugaenglich."},
{frage:"Welche Aufgabe hat ein Client?",antworten:["Er nutzt Dienste eines Servers","Er stellt Dienste fuer andere bereit","Er verwaltet das gesamte Netzwerk","Er ersetzt den Switch"],richtig:0,erklaerung:"Ein Client ist ein Geraet oder Programm, das auf Dienste eines Servers zugreift. Ein Webbrowser ist z.B. ein Client, der Webseiten von einem Webserver anfordert."},
{frage:"Was bedeutet HTTPS?",antworten:["Eine verschluesselte Verbindung zu Webseiten","Eine unverschluesselte Verbindung","Ein Betriebssystem","Ein Antivirenprogramm"],richtig:0,erklaerung:"HTTPS (HyperText Transfer Protocol Secure) verschluesselt die Daten zwischen Browser und Webseite mit TLS/SSL. Das schuetzt Passwoerter, persoenliche Daten und Zahlungen vor Abfangen."},
{frage:"Welche Aussage zu VPN ist richtig?",antworten:["VPN macht den Computer schneller","VPN verschluesselt die Datenuebertragung ueber ein oeffentliches Netzwerk","VPN ersetzt eine Firewall vollstaendig","VPN entfernt automatisch Viren"],richtig:1,erklaerung:"Ein VPN (Virtual Private Network) baut einen verschluesselten Tunnel ueber ein oeffentliches Netzwerk auf. Es schuetzt die Privatsphaere und ermoeglicht sicheren Fernzugriff auf Firmennetze."},
{frage:"Was ist der Unterschied zwischen Download und Upload?",antworten:["Beides bedeutet dasselbe","Download laedt Daten vom Internet auf das eigene Geraet, Upload sendet Daten vom Geraet ins Internet","Download funktioniert nur ueber WLAN","Upload bedeutet Herunterladen"],richtig:1,erklaerung:"Download uebertraegt Daten vom Internet zum eigenen Geraet (z.B. Film schauen, Datei speichern). Upload sendet Daten vom eigenen Geraet ins Internet (z.B. Foto auf Instagram posten, E-Mail senden)."},
{frage:"100 Mbit/s entsprechen ungefaehr wieviel MB/s?",antworten:["12,5 MB/s","100 MB/s","50 MB/s","8 MB/s"],richtig:0,erklaerung:"Da 1 Byte = 8 Bit gilt: 100 Mbit/s geteilt durch 8 = 12,5 MB/s. Das ist wichtig, weil Internetanbieter in Mbit/s angeben, Dateigroessen aber meist in MB."},
{frage:"Was bedeutet Latenz oder Ping?",antworten:["Die Groesse einer Festplatte","Die Reaktionszeit einer Netzwerkverbindung","Die Anzahl der installierten Dateien","Die Bildschirmaufloesung"],richtig:1,erklaerung:"Ping (oder Latenz) ist die Zeit, die ein Datenpaket braucht, um zum Ziel und zurueck zu reisen. Ein niedriger Ping (z.B. 20 ms) bedeutet eine schnelle Reaktion, wichtig fuer Online-Gaming oder Videotelefonie."},
{frage:"Welche Backup-Art speichert alle ausgewaehlten Daten vollstaendig?",antworten:["Cloud-Synchronisation","Inkrementelles Backup","Differenzielles Backup","Vollbackup"],richtig:3,erklaerung:"Ein Vollbackup sichert alle ausgewaehlten Daten uneingeschraenkt. Es dauert laenger und braucht mehr Speicher, ist aber die Basis fuer alle anderen Backup-Arten."},
{frage:"Welche Backup-Art speichert nur die Aenderungen seit dem letzten Backup (egal welcher Art)?",antworten:["Vollbackup","Inkrementelles Backup","Differenzielles Backup","Systemupdate"],richtig:1,erklaerung:"Ein inkrementelles Backup speichert nur Dateien, die sich seit dem letzten Backup (egal ob Voll oder inkrementell) geaendert haben. Es ist schnell und speichersparend, aber die Wiederherstellung erfordert alle Backup-Schritte nacheinander."},
{frage:"Welche Backup-Art speichert alle Aenderungen seit dem letzten Vollbackup?",antworten:["Cloud-Synchronisation","Inkrementelles Backup","Vollbackup","Differenzielles Backup"],richtig:3,erklaerung:"Ein differenzielles Backup speichert alle Aenderungen seit dem letzten Vollbackup. Bei Wiederherstellung braucht man nur das Vollbackup und das letzte differenzielle Backup."},
{frage:"Was besagt die 3-2-1-Backup-Regel?",antworten:["3 Server, 2 Router, 1 Firewall","3 Passwoerter, 2 Benutzer, 1 Computer","3 Kopien, auf 2 verschiedenen Medien, 1 Kopie an anderem Ort","3 Updates pro Jahr, 2 Programme, 1 Backup"],richtig:2,erklaerung:"Die 3-2-1-Regel: Halte 3 Kopien deiner Daten, auf mindestens 2 verschiedenen Speichermedien, mit mindestens 1 Kopie an einem anderen Ort. So schuetzt du vor Datenverlust durch Defekt, Diebstahl oder Katastrophen."},
{frage:"Was bedeutet Authentifizierung?",antworten:["Die Ueberpruefung der Identitaet einer Person oder eines Geraets","Die Festlegung von Rechten","Die Verschluesselung von Daten","Die Erhoehung der Internetgeschwindigkeit"],richtig:0,erklaerung:"Authentifizierung prueft, ob jemand der ist, der er vorgibt zu sein, z.B. durch Passwort, Fingerabdruck oder Chipkarte. Es beantwortet die Frage 'Wer bist du?'."},
{frage:"Was bedeutet Autorisierung?",antworten:["Die Ueberpruefung der Identitaet","Die Festlegung, was eine authentifizierte Person tun darf","Die Verschluesselung von Daten","Die Erstellung von Backups"],richtig:1,erklaerung:"Autorisierung legt fest, welche Rechte ein authentifizierter Benuer hat, z.B. 'Datei lesen' oder 'Datei aendern'. Es beantwortet die Frage 'Was darfst du tun?'."},
{frage:"Welche Malware tarnt sich als nuetzliches Programm?",antworten:["Firewall","Wurm","Virus","Trojaner"],richtig:3,erklaerung:"Ein Trojaner tarnt sich als harmloses oder nuetzliches Programm, enthaelt aber versteckten Schadcode. Er wird oft ueber gefaelschte Downloads oder E-Mail-Anhaenge verbreitet."},
{frage:"Was ist Ransomware?",antworten:["Ein Betriebssystem","Ein Programm zum Schreiben von Texten","Schadsoftware, die Daten verschluesselt und Geld fuer die Entschluesslung fordert","Ein Backup-Tool"],richtig:2,erklaerung:"Ransomware verschluesselt die Dateien des Opfers und fordert Loesegeld (meist in Kryptowaehrung) fuer die Freigabe. Backups sind der beste Schutz, da eine Zahlung keine Wiederherstellung garantiert."},
{frage:"Was macht ein Antivirenprogramm?",antworten:["Es ersetzt das Betriebssystem","Es erhoeht den Arbeitsspeicher","Es erkennt und entfernt Schadsoftware","Es erstellt Webseiten"],richtig:2,erklaerung:"Antivirenprogramme scannen Dateien und Prozesse nach bekannten Virensignaturen und verdächtigem Verhalten. Sie sollten regelmaessig aktualisiert werden, da neue Bedrohungen staendig entstehen."},
{frage:"Was sind Virensignaturen?",antworten:["Passwoerter von Viren","Bekannte Merkmale von Schadsoftware, an der sie erkannt wird","Internetadressen von Hackern","Physische Marken an Festplatten"],richtig:1,erklaerung:"Virensignaturen sind charakteristische Muer in Schadcode, an denen Antivirenprogramme bekannte Malware erkennen. Aehnlich wie ein Fingerabdruck sind sie eindeutig fuer jede Schadsoftware-Variante."},
{frage:"Was ist eine Quarantaene bei Antivirenprogrammen?",antworten:["Ein Backup-Speicher","Ein isolierter Bereich, in den verdächtige Dateien verschoben werden","Ein Benuerkonto fuer Viren","Ein Netzwerk fuer Malware"],richtig:1,erklaerung:"In der Quarantaene werden verdächtige Dateien isoliert, sodass sie nicht ausgefuehrt werden koennen. Der Benuer kann spaeter entscheiden, ob sie geloescht oder freigegeben werden."},
{frage:"Welche Aufgabe hat eine Firewall?",antworten:["Programme installieren","Dateien speichern","Datenverkehr ueberwachen und unerlaubte Zuegriffe blockieren","Fotos bearbeiten"],richtig:2,erklaerung:"Eine Firewall prueft eingehenden und ausgehenden Datenverkehr anhand von Regeln und blockiert unerwuenschte oder gefaehrliche Verbindungen. Sie ist eine erste Verteidigungslinie im Netzwerk."},
{frage:"Was ist eine Software-Firewall?",antworten:["Eine Firewall, die als Programm auf dem Computer laeuft","Eine Festplatte","Ein Routerkabel","Ein Betriebssystem"],richtig:0,erklaerung:"Eine Software-Firewall laeuft direkt auf dem Computer (z.B. Windows Defender). Sie schuetzt das einzelne Geraet und kann programmepezifisch konfiguriert werden."},
{frage:"Was ist eine Hardware-Firewall?",antworten:["Eine Firewall, die in ein Netzwerkgeraet integriert ist (z.B. Router)","Ein USB-Stick","Ein Bildschirm","Eine App"],richtig:0,erklaerung:"Eine Hardware-Firewall ist ein eigenes Geraet oder im Router integriert und schuetzt das gesamte Netzwerk, bevor Datenverkehr die einzelnen Geraete erreicht."},
{frage:"Was ist ein Betriebssystem?",antworten:["Ein Spiel","Ein Kabel","Eine Maus","Die grundlegende Software, die Hardware und Programme verwaltet"],richtig:3,erklaerung:"Das Betriebssystem (z.B. Windows, macOS, Linux) verbindet Hardware und Anwendungsprogramme. Es verwaltet Ressourcen wie CPU, Speicher und Geraete und stellt eine Benutzeroberflaeche bereit."},
{frage:"Was bedeutet GUI?",antworten:["Grafische Benutzeroberflaeche","Grosses USB-Geraet","Globale Internet-Verbindung","Geraete-Ueberwachungs-Interface"],richtig:0,erklaerung:"GUI (Graphical User Interface) ist eine Benutzeroberflaeche mit Fenstern, Symbolder und Mausbedienung. Sie ermoeglicht die Nutzung ohne Textkommandos, im Gegensatz zur Kommandozeile."},
{frage:"Was bedeutet CLI?",antworten:["Ein Speichermedium","Ein Bildschirmtyp","Bedienung ueber Texteingaben und Befehle","Eine Grafikkarte"],richtig:2,erklaerung:"CLI (Command Line Interface) ist eine textbasierte Schnittstelle, in der Benuer Befehle ueber die Tastatur eingeben. Sie ist leistungsfaehiger, erfordert aber Wissen der Befehlssyntax."},
{frage:"Was ist Multitasking bei Betriebssystemen?",antworten:["Mehrere Computer kaufen","Mehrere Passwoerter benutzen","Mehrere Programme scheinbar gleichzeitig ausfuehren","Dateien loeschen"],richtig:2,erklaerung:"Multitasking ermoeglicht das gleichzeitige Ausfuehren mehrerer Programme. Das Betriebssystem teilt schnell CPU-Zeit zwischen den Prozessen auf, sodass sie scheinbar parallel laufen."},
{frage:"Was ist ein Treiber?",antworten:["Eine Webseite","Ein Virus","Ein Programm, das die Kommunikation zwischen Betriebssystem und Hardware ermoeglicht","Ein Benuerkonto"],richtig:2,erklaerung:"Ein Treiber (Device Driver) ist Software, die dem Betriebssystem ermoeglicht, mit einem bestimmten Hardware-Geraet (z.B. Drucker, Grafikkarte) zu kommunizieren. Ohne Treiber funktioniert das Geraet nicht korrekt."},
{frage:"Was ist RAM?",antworten:["Ein schneller, fluechtiger Speicher fuer laufende Programme","Eine dauerhafte Festplatte","Ein Router"," Eine Firewall"],richtig:0,erklaerung:"RAM (Random Access Memory) ist der Arbeitsspeicher, in dem Daten laufender Programme schnell abrufbar liegen. Er ist fluechtig: Nach dem Ausschalten gehen diese Daten verloren."},
{frage:"Was passiert typischerweise, wenn der RAM nicht ausreicht?",antworten:["Die Tastatur wird entfernt","Der Bildschirm verschwindet","Das Internet wird geloescht","Der Computer wird langsamer, weil er auf Festplatte ausweicht"],richtig:3,erklaerung:"Wenn der RAM voll ist, nutzt das Betriebssystem virtuellen Speicher auf der Festplatte (Auslagerungsdatei). Das ist viel langsamer als RAM, daher spuert man einen Leistungseinbruch."},
{frage:"Was ist eine HDD?",antworten:["Eine klassische magnetische Festplatte","Ein Browser","Eine Firewall","Ein Betriebssystem"],richtig:0,erklaerung:"HDD (Hard Disk Drive) ist eine magnetische Festplatte mit rotierenden Scheiben. Sie ist guenstiger pro GB als SSD, aber mechanisch und deutlich langsamer."},
{frage:"Was ist eine SSD?",antworten:["Ein Monitor","Eine Tastatur","Ein Router","Ein schneller elektronischer Massenspeicher ohne Bewegungsteile"],richtig:3,erklaerung:"SSD (Solid State Drive) speichert Daten auf Flash-Speicherbausteinen ohne mechanische Teile. Sie ist schneller, robuster und leiser als eine HDD, aber teurer pro GB."},
{frage:"Was zeigt der Task-Manager unter Windows?",antworten:["Auslastung von CPU, RAM und laufenden Prozessen","Nur Fotos","Nur Passwoerter","Nur WLAN-Informationen"],richtig:0,erklaerung:"Der Task-Manager zeigt Prozesse, CPU- und RAM-Auslastung, Netzwerkaktivitaet und ermoeglicht das Beenden von abgestuerzten Programmen (Strg+Shift+Esc)."},
{frage:"Was zeigt der Geraete-Manager unter Windows?",antworten:["Benuerpasswoerter","Internetgeschwindigkeit","Die angeschlossene Hardware und deren Treiber","Webseiten"],richtig:2,erklaerung:"Im Geraete-Manager sieht man alle Hardwarekomponenten und ihre Treiber. Fehlerhafte Treiber werden mit gelbem Ausrufezeichen angezeigt und koennen hier aktualisiert oder deinstalliert werden."},
{frage:"Was ist eine CPU?",antworten:["Ein Netzwerkgeraet","Ein Speicherstick","Der Prozessor, der Berechnungen und Befehle ausfuehrt","Ein Bildschirm"],richtig:2,erklaerung:"Die CPU (Central Processing Unit) ist der Prozessor des Computers. Sie fuehrt Programme aus, macht Berechnungen und steuert andere Hardwarekomponenten. Mehr Kerne ermoeglichen mehr parallele Aufgaben."},
{frage:"Welches Programm oeffnet normalerweise .docx-Dateien?",antworten:["Paint","Word oder eine aehnliche Textverarbeitung","Browser","Rechner"],richtig:1,erklaerung:".docx-Dateien sind Word-Dokumente. Sie werden von Microsoft Word oder kompatiblen Textverarbeitungen (z.B. LibreOffice Writer) geoeffnet. Das Format basiert auf XML und ist ein Offener Standard."},
{frage:"Welches Programm oeffnet normalerweise PDF-Dateien?",antworten:["PDF-Reader","Task-Manager","Geraete-Manager","Datei-Explorer"],richtig:0,erklaerung:"PDF-Dateien werden mit einem PDF-Viewer (z.B. Adobe Acrobat Reader, Browser) geoeffnet. PDFs bewahren das Layout unabhaengig von Geraet und Programm, ideal fuer Dokumente zum Drucken oder Teilen."},
{frage:"Welche Dateiendungen sind typische Windows-Installationsdateien?",antworten:[".exe und .msi",".jpg und .png",".mp3 und .wav",".txt und .doc"],richtig:0,erklaerung:".exe (Executable) und .msi (Microsoft Installer) sind typisch fuer Windows-Installationen. Beim Ausfuehren werden Programmdateien kopiert und Systemeinstellungen angepasst."},
{frage:"Was bedeutet Deinstallation?",antworten:["Installation eines Updates","Entfernen eines Programms vom Computer","Erstellen eines Backups","Aendern des Hintergrundbildes"],richtig:1,erklaerung:"Bei der Deinstallation werden Programmdateien und zugehoerige Eintraege entfernt. Das gibt Speicherplatz frei und entfernt ungenutzte Software, die potenzielle Sicherheitsluecken darstellen koennte."},
{frage:"Welche Tastenkombination oeffnet die Windows-Einstellungen?",antworten:["ALT + F4","STRG + ALT + ENTF","Windows + I","Windows + E"],richtig:2,erklaerung:"Windows + I oeffnet direkt die Windows-Einstellungen. Windows + E oeffnet den Datei-Explorer, STRG+ALT+ENTF oeffnet Sicherheitsoptionen, ALT+F4 schliesst das aktive Fenster."},
{frage:"Wie wechselt man schnell die Tastatursprache unter Windows?",antworten:["Windows + Leertaste","STRG + S","ALT + TAB","F5"],richtig:0,erklaerung:"Windows + Leertaste wechselt unter Windows 10/11 durch die installierten Eingabesprachen. Alternativ kann man Alt+Shift verwenden oder die Sprache in der Taskleiste umschalten."},
{frage:"Warum sind Software-Updates wichtig?",antworten:["Sie entfernen Hardware","Sie schliessen Sicherheitsluecken und verbessern das System","Sie machen Programme illegal","Sie loeschen alle Dateien"],richtig:1,erklaerung:"Updates beheben Sicherheitsluecken, Fehler und bringen neue Funktionen. Ungepatchte Software ist ein haeufiges Einfallstor fuer Angreifer, deshalb sollte man regelmaessig aktualisieren."},
{frage:"Warum kann nach einem Update ein Neustart noetig sein?",antworten:["Damit Systemaenderungen vollstaendig uebernommen werden","Damit Dateien verschwinden","Damit WLAN geloescht wird","Damit Programme gesperrt werden"],richtig:0,erklaerung:"Manche Updates aendern Systemdateien, die im laufenden Betrieb gesperrt sind. Erst beim Neustart koennen diese Dateien ausgetauscht und die Aenderungen aktiv werden."},
{frage:"Wie weit sollte der Bildschirm ungefaehr entfernt sein?",antworten:["10 Meter","5 cm","2 Meter","50-80 cm"],richtig:3,erklaerung:"Ein Bildschirmabstand von 50-80 cm schont die Augen und verhindert eine zu starke Augenanstrengung. Bei groesseren Bildschirmen kann der Abstand etwas groesser sein."},
{frage:"Wo sollte die Oberkante des Bildschirms idealerweise sein?",antworten:["Weit ueber der Decke","Unter dem Tisch","Auf oder leicht unter Augenhoehe","Auf dem Boden"],richtig:2,erklaerung:"Die Bildschirmoberkante sollte auf Augenhoehe oder leicht darunter sein. So bleibt der Nacken entspannt und man vermeidet Nacken- und Rueckenschmerzen vom stundenlangen Arbeiten."},
{frage:"Warum sollte man regelmassig Pausen beim Computerarbeiten machen?",antworten:["Um Programme zu installieren","Um Updates zu loeschen","Um Speicherplatz zu erhoehen","Um Augen und Koerper zu entlasten"],richtig:3,erklaerung:"Die 20-20-20-Regel empfiehlt alle 20 Minuten einen Blick auf 20 Fuss (ca. 6 m) Entfernung fuer 20 Sekunden. Pausen verhindern Ermuedung, Augenbelastung und koerperliche Verspannungen."},
{frage:"Was kann eine falsche Sitzhaltung am Computer verursachen?",antworten:["Mehr Speicherplatz","Schnelleres Internet","Ruecken- und Nackenschmerzen","Neue Programme"],richtig:2,erklaerung:"Falsche Sitzhaltung fuehrt zu Verspannungen, Ruecken- und Nackenschmerzen sowie headweh. Ergonomische Moebel und ein wechselnder Sit-Stand-Arbeitsplatz koennen dem entgegenwirken."},
{frage:"Was bedeutet RSI?",antworten:["Eine Art Internetverbindung","Belastungsbedingte Verletzung durch wiederholte Bewegungen","Ein Dateiformat","Ein Betriebssystem"],richtig:1,erklaerung:"RSI (Repetitive Strain Injury) ist eine Ueberlastungsverletzung durch wiederholte Bewegungen, z.B. Mausklicken oder Tippen. Aeussert sich als Schmerzen in Handgelenk, Arm oder Schulter. Pausen und ergonomische Arbeitsweise helfen."},
{frage:"Was bedeutet Barrierefreiheit in der IT?",antworten:["Internet sperren","Computer nur fuer Experten bauen","Technik fuer moeglichst viele Menschen nutzbar machen, inklusive Menschen mit Behinderung","Programme entfernen"],richtig:2,erklaerung:"Barrierefreiheit sorgt dafuer, dass Menschen mit Einschrakungen (Sehen, Hoeren, Motorik) Technik nutzen koennen. Beispiele: Screenreader, Untertitel, hoher Kontrast, Tastaturnavigation."},
{frage:"Was macht ein Bildschirmleseprogramm (Screenreader)?",antworten:["Es erstellt Backups","Es loescht Dateien","Es liest Bildschirminhalte laut vor","Es installiert Treiber"],richtig:2,erklaerung:"Screenreader wandeln Bildschirminhalte in Sprache oder Braille-Ausgabe um. Sie ermoeglichen blinden und sehbehinderten Menschen die Bedienung von Computer und Webseiten."},
{frage:"Warum werden Untertitel bei Videos verwendet?",antworten:["Zum Speichern von Dateien","Zur Unterstuetzung hore-behinderter Menschen und in lauter Umgebung","Zum Schutz vor Viren","Zum Erhoehen der Geschwindigkeit"],richtig:1,erklaerung:"Untertitel machen Videos fuer Hoer-beeintruechtigte Menschen zugaenglich und helfen beim Verstehen in lauter Umgebung oder in Fremdsprachen. Sie sind ein wichtiger Teil der Barrierefreiheit."},
{frage:"Was bedeutet ISP?",antworten:["Internet System Port","Internal Security Program","Internet Service Provider","Input Service Protocol"],richtig:2,erklaerung:"ISP (Internet Service Provider) ist ein Internetanbieter wie Telekom, Vodafone oder O2. Er stellt die Verbindung ins Internet bereit, meist gegen eine monatliche Gebuehr."},
{frage:"Welche Technik nutzt Glasfaser fuer die Datenuebertragung?",antworten:["Lichtsignale","Papier","Magnete","Schall"],richtig:0,erklaerung:"Glasfaserkabel uebertragen Daten mittels Lichtsignalen durch Haarfne Glasfasern. Sie sind extrem schnell und koennen grosse Datenmengen ueber weite Strecken ohne Verlust uebertragen."},
{frage:"Welche Technologie gehoert zum Mobilfunk?",antworten:["HDMI","5G","USB","SATA"],richtig:1,erklaerung:"5G ist ein Mobilfunkstandard mit hohen Datenraten und geringer Latenz. 4G/LTE ist der Vorgaenger; 6G befindet sich in Entwicklung. HDMI, USB und SATA sind Kabel-Verbindungen."},
{frage:"Was ist ein Intranet?",antworten:["Das gesamte Internet","Ein internes Netzwerk einer Organisation, nur fuer Benuer innerhalb zugaenglich","Ein Antivirenprogramm","Eine Festplatte"],richtig:1,erklaerung:"Ein Intranet ist ein privates Netzwerk innerhalb einer Firma oder Organisation. Es nutzt Internet-Technologie, ist aber nur fuer autorisierte interne Benuer zugaenglich, z.B. fuer Firmenseiten oder Dokumentation."},
{frage:"Was ist ein Peer-to-Peer-Netzwerk?",antworten:["Nur ein Server arbeitet","Alle Computer sind gleichberechtigt, ohne zentralen Server","Nur Router kommunizieren","Es gibt keine Verbindung"],richtig:1,erklaerung:"In einem Peer-to-Peer-Netzwerk sind alle Teilnehmer gleichberechtigt. Jeder kann Dienste anbieten und nutzen, ohne zentralen Server. Beispiele: BitTorrent, Sync-Software. Vorteil: keine zentrale Ausfallstelle."},
{frage:"Warum sind sichere Passwoerter wichtig?",antworten:["Sie speichern automatisch Dateien","Sie erhoehen die Bildschirmgroesse","Sie ersetzen Updates","Sie schuetzen Konten vor unbefugtem Zugriff"],richtig:3,erklaerung:"Sichere Passwoerter sind lang (12+ Zeichen) und kombinieren Gross-/Kleinbuchstaben, Zahlen und Sonderzeichen. Sie erschweren Hackern das Erraten oder Automatisieren von Angriffen."},
{frage:"Was ist Zwei-Faktor-Authentifizierung (2FA)?",antworten:["Zwei Betriebssysteme","Zwei gleiche Passwoerter","Zwei Computer","Zusaetzliche Anmeldung mit einem zweiten Sicherheitsfaktor neben dem Passwort"],richtig:3,erklaerung:"Bei 2FA braucht man neben dem Passwort einen zweiten Faktor, z.B. einen Code per SMS, eine Authenticator-App oder einen Fingerabdruck. Selbst bei geklautem Passwort bleibt das Konto so geschuezt."},
{frage:"Was ist Phishing?",antworten:["Eine Hardwarepruefung","Eine Datensicherung","Der Versuch, durch Taeuschung an sensible Daten zu gelangen","Ein Systemupdate"],richtig:2,erklaerung:"Phishing-Angriffe nutzen gefaelschte E-Mails, Webseiten oder Nachrichten, um Opfer zur Eingabe von Passwoertern oder Bankdaten zu verleiten. Pruefe immer die Absenderadresse und klicke nicht voreilig auf Links."},
{frage:"Wie gelangen Viren haeufig auf Computer?",antworten:["Nur durch Monitore","Ueber E-Mail-Anhaenge, Downloads oder unsichere Webseiten","Nur durch Tastaturen","Durch Papier"],richtig:1,erklaerung:"Viren verbreiten sich ueber gefaelschte Downloads, boeswillige E-Mail-Anhaenge, gepiratete Software oder unsichere Webseiten. Antivirensoftware und Vorsicht beim Oeffnen von Dateien schuetzen."},
{frage:"Kann ein Computer ohne Internet-Verbindung infiziert werden?",antworten:["Nur ueber WLAN","Nein, niemals","Ja, z.B. ueber infizierte USB-Sticks","Nur ueber den Router"],richtig:2,erklaerung:"Auch ohne Internet kann Malware gelangen, z.B. durch infizierte USB-Sticks, externe Festplatten oder Software-CDs. Das ist ein Grund, warum auch Offline-Computer Antivirensoftware nutzen sollten."},
{frage:"Was ist ein Keylogger?",antworten:["Ein Programm, das Tastatureingaben aufzeichnet","Ein Backup-Tool","Ein Browser","Ein Drucker"],richtig:0,erklaerung:"Keylogger zeichnen alle Tastatureingaben auf, um Passwoerter oder Kreditkartendaten zu stehlen. Sie koennen als Software oder sogar als Hardware (Adapter am Kabel) auftreten."},
{frage:"Was bedeutet Verschluesselung?",antworten:["Daten werden geloescht","Daten werden so umgewandelt, dass nur Berechtigte sie lesen koennen","Daten werden gedruckt","Daten werden verlangsamt"],richtig:1,erklaerung:"Verschluesselung wandelt Klartext mit einem Schluessel in einen unlesbaren Text um. Nur mit dem passenden Schluessel kann man ihn wieder entschluesseln. Wichtig fuer Privatsphaere und Sicherheit."},
{frage:"Was ist ein Administrator-Konto?",antworten:["Ein Benuer mit erweiterten Rechten zur Systemverwaltung","Ein Virus","Ein Router","Eine Datei"],richtig:0,erklaerung:"Administratoren duerfen Systemeinstellungen aendern, Software installieren und andere Benuer verwalten. Fuer den Alltag sollte man ein Standard-Konto nutzen, um Schadmoeglichkeiten zu begrenzen."},
{frage:"Was ist ein Browser?",antworten:["Eine Festplatte","Ein Prozessor","Ein Programm zum Anzeigen von Webseiten","Ein Router"],richtig:2,erklaerung:"Browser (z.B. Chrome, Firefox, Edge, Safari) rufen Webseiten auf, interpretieren HTML/CSS/JS und stellen sie dar. Sie sind das Tor zum World Wide Web und sollten aktuell gehalten werden."},
{frage:"Was ist Streaming?",antworten:["Programme entfernen","Dateien loeschen","Hardware austauschen","Direktes Abspielen von Medien, ohne vollstaendigen Download"],richtig:3,erklaerung:"Beim Streaming werden Medien (Video, Audio) in Echtzeit uebertragen und abgespielt, waehrend weitere Daten nachladen. Beispiele: Netflix, Spotify, YouTube. Es spart Speicherplatz gegenueber dem Download."},
{frage:"Was sind Cloud-Dienste?",antworten:["Ein Kabeltyp","Eine Grafikkarte","Online bereitgestellte Dienste und Speicher, die ueber das Internet zugaenglich sind","Eine Mausart"],richtig:2,erklaerung:"Cloud-Dienste (z.B. Google Drive, OneDrive, Dropbox) bieten Speicher und Anwendungen ueber das Internet an. Vorteil: Zugriff von ueberall, Nachteil: Abhaengigkeit vom Internet und externem Anbieter."},
{frage:"Warum sollte man oeffentliche WLANs vorsichtig nutzen?",antworten:["Weil Daten abgefangen werden koennten","Weil Computer explodieren","Weil Updates verboten sind","Weil Speicher verschwindet"],richtig:0,erklaerung:"Oeffentliche WLANs sind oft unverschluesselt, sodass Angreifer Daten abfangen koennen. Ein VPN schuetzt in solchen Netzwerken. Vertrauliche Aktivitaeten (Banking) sollte man in oeffentlichen WLANs vermeiden."},
{frage:"Was bedeutet HTML?",antworten:["HighTech Modern Language","HyperText Markup Language","HomeTool Markup Language","HyperText Management Language"],richtig:1,erklaerung:"HTML ist die Auszeichnungssprache, die die Struktur von Webseiten festlegt. Sie verwendet Tags wie <p> oder <h1>, um Text zu strukturieren. CSS und HTML ergaenzen HTML fuer Layout und Interaktivitaet."},
{frage:"Was ist CSS?",antworten:["Creative Styling Standard","Computer Style System","Cascading Style Sheets","Colorful Style System"],richtig:2,erklaerung:"CSS legt fest, wie HTML-Elemente aussehen (Farbe, Groesse, Position, Schrift). 'Cascading' bedeutet, dass mehrere Regeln nacheinander angewandt werden und vererbte Styles von uebergeordneten Elementen gelten."},
{frage:"Was bewirkt ein HTML-Tag wie <b>?",antworten:["Text wird geloescht","Text wird fett dargestellt","Text wird gedruckt","Text wird verschluesselt"],richtig:1,erklaerung:"Das <b>-Tag stellt Text fett dar. Es ist rein optisch; dasselbe wird mit CSS font-weight:bold erreicht. Fuer besonderen Nachdruck verwendet man <strong>, das auch semantisch als 'wichtig' gilt."},
{frage:"Welches Attribut macht einen Link zu einer anklickbaren URL?",antworten:["class","src","alt","href"],richtig:3,erklaerung:"href ist das Attribut in einem <a>-Link, das das Ziel angibt. Beispiel: <a href='https://beispiel.de'>Link</a>. Beim Klick landet man auf der Ziel-URL. 'src' nutzt man fuer Bilder, 'alt' fuer Alternativtext."},
{frage:"Was macht das <img>-Tag in HTML?",antworten:["Eine Tabelle","Einen Link einfuegen","Einen Kommentar","Eine Bilddatei einfuegen"],richtig:3,erklaerung:"Das <img>-Tag zeigt ein Bild an. Mit src wird die Bild-URL angegeben, mit alt ein Alternativtext. Beispiel: <img src='logo.png' alt='Firmenlogo'>. Das alt-Attribut ist wichtig fuer Barrierefreiheit."},
{frage:"Was ist der Zweck des alt-Attributs bei Bildern?",antworten:["Das Bild verschluesseln","Den Dateinamen aendern","Das Bild vergroessern","Alternativtext fuer Screenreader und bei Bildladefehlern"],richtig:3,erklaerung:"alt gibt einen Text an, der gelesen wird, wenn das Bild nicht geladen werden kann oder fuer blinde Nutzer. Es ist auch ein Rankingfaktor fuer Suchmaschinen und zusaetzliche Pflicht fuer Barrierefreiheit."},
{frage:"Welches Element gruppiert Elemente blockweise (neue Zeile)?",antworten:["<span>","<div>","<p>","<a>"],richtig:1,erklaerung:"Ein <div> ist ein block-Element, das beim Standardlayout eine neue Zeile beginnt und andere Elemente enthalten kann. <span> ist die inline-Variante fuer Formatierungen innerhalb einer Zeile."},
{frage:"Was ist eine DNS-Aufloesung?",antworten:["Verschluesselung von E-Mails","Speicherung von Dateien","Umwandlung eines Domainnamens wie 'google.com' in eine IP-Adresse","Erstellung von Backups"],richtig:2,erklaerung:"DNS (Domain Name System) uebersetzt menschenlesbare Hostnamen wie 'google.com' in IP-Adressen wie '142.250.180.14'. Ohne DNS muesst man sich IP-Adressen als Webadressen merken. Es ist wie das Telefonbuch des Internets."},
{frage:"Welche Bedeutung hat der Cache im Browser?",antworten:["Loescht alle Dateien","Temporaerer Speicher, der geladene Webseiten beschleunigt wiederverwendet","Blockiert Werbung","Schuetzt vor Viren"],richtig:1,erklaerung:"Im Browser-Cache werden Bilder, Skripte und Style-Sheets gespeichert. Bei erneuten Benu speichert der Cache geladene Dateien, der Aufbau erfolgt schneller. 'Cache leeren' zwingt den Browser, aktuelle Versionen zu laden."},
{frage:"Was ist ein Cookie?",antworten:["Ein Computervirus","Kleine Textdatei, die eine Webseite im Browser speichert, um sich z.B. an den Login zu erinnern","Ein Browser-Typ","Eine Festplatte"],richtig:1,erklaerung:"Cookies speichern Daten im Browser, z.B. Login-Status, Sprache oder Einkaufswagen. Sie werden bei jedem Aufruf der jeweiligen Webseite an den Server geschickt. Sie koennen in den Browsereinstellungen geloescht oder blockiert werden."},
{frage:"Was ist der Unterschied zwischen session und persistent Cookies?",antworten:["Persistente Cookies sind immer soos","Session-Cookies verschluesseln Daten","Session-Cookies werden beim Schliessen des Browsers geloescht, persistente bleiben laenger","Es gibt keinen Unterschied"],richtig:2,erklaerung:"Session-Cookies existieren nur waehrend einer Browsersitzung und verschwinden beim Schliessen. Persistente Cookies haben ein Verfallsdatum und bleiben ueber Browserneustarts hinaus auf dem Computer gespeichert (z.B. fuer 'Angemeldet bleiben')."},
{frage:"Was ist der html-Tagsinn in einer <ul>-Liste?",antworten:["Ein Hyperlink","Geordnete Liste mit Zahlen","Ein Datenrahmen","Ungeordnete Liste mit Aufzaehlungspunkten"],richtig:3,erklaerung:"<ul> (unordered list) erstellt eine ungeordnete Liste mit Bullets. <ol> ist eine nummerierte Liste. Beide enthalten <li>-Elemente als einzelne Listeneintraege."},
{frage:"Welches HTML-Tag erzeugt ein Formular mit Eingabefeldern?",antworten:["<header>","<table>","<input>","<form>"],richtig:3,erklaerung:"<form> gruppiert Eingabefelder. Die einzelnen Felder werden mit <input>, <textarea> oder <select> darin platziert. Beim Absenden werden die Daten an die im action-Attribut angegebene URL gesendet."},
{frage:"Was bedeutet das <head>-Element in HTML?",antworten:["Ist ein Link zum Internet","Enthaelt den sichtbaren Haupttext","Enthaelt Meta-Informationen und Verknuepfungen, nicht sichtbar auf der Seite","Ist ein Button"],richtig:2,erklaerung:"Im <head> stehen Titel, Zeichensatz, Verknuepfungen zur CSS-Datei, Meta-Angaben fuer Suchmaschinen u.a. Diese Inhalte werden nicht direkt auf der Seite angezeigt. Der <body> enthaelt die sichtbaren Inhalte."},
{frage:"Was ist JavaScript?",antworten:["Ein Browser","Eine Programmiersprache fuer interaktive Webseiten","Ein Betriebssystem","Ein Antivirenprogramm"],richtig:1,erklaerung:"JavaScript laeuft im Browser und macht Webseiten interaktiv: Animationen, Formularpruefung, dynamisches Laden von Inhalten. Es ist grundlegend verschieden von Java, trotz aehnlichem Namen."},
{frage:"Wofuer wird JavaScript im Browser verwendet?",antworten:["Als Betriebssystem","Interaktivitaet, Animationen, Formularpruefung, dynamisches Nachladen","Als Antivirenprogramm","Als Textverarbeitung"],richtig:1,erklaerung:"JavaScript macht Webseiten interaktiv: Es reagiert auf Klicks, validiert Formulare, laedt Inhalte nach und steuert Animationen. Es laeuft direkt im Browser des Benuers und ist eine der wichtigsten Web-Technologien."},
{frage:"Was ist der Unterschied zwischen Java und JavaScript?",antworten:["Es gibt keinen Unterschied","JavaScript ist eine Erweiterung von Java","Java ist ein Browser-Plugin","Sie sind zwei komplett verschiedene Programmiersprachen"],richtig:3,erklaerung:"Java und JavaScript sind zwei verschiedene Sprachen. Java ist eine allgemeine Programmiersprache fuer Anwendungen und Android-Apps. JavaScript laeuft im Browser und macht Webseiten interaktiv. Aehnlicher Name ist historischer Zufall."},
{frage:"Was ist ein HTML-Formular?",antworten:["Ein Bereich zum Sammeln von Benuereingaben","Ein Backupsystem","Ein Antivirenprogramm","Ein Netzwerkgeraet"],richtig:0,erklaerung:"Ein <form>-Element sammelt Benuereingaben wie Text, Auswahl, Passwoerter und sendet diese an einen Server. Es enthaelt <input>-, <textarea>- und <select>-Felder und hat ein action-Attribut fuer die Ziel-URL."},
{frage:"Was bewirkt das input-Attribut type='password'?",antworten:["Eingabe wird als Punkte/Sternchen angezeigt","Eingabe wird verschluesselt gesendet","Eingabe wird geloescht","Eingabe wird nicht gesendet"],richtig:0,erklaerung:"type='password' versteckt die Eingabe hinter Punkten/Sternchen, damit Unbefugte sie nicht vom Bildschirm ablesen. Verschluesselt wird sie aber erst beim Senden ueber HTTPS."},
{frage:"Was ist WEP?",antworten:["Eine veraltete WLAN-Verschluesselung, heute unsicher","Ein neuer WLAN-Standard","Ein Browser","Ein Antivirenprogramm"],richtig:0,erklaerung:"WEP (Wired Equivalent Privacy) war die erste WLAN-Verschluesselung. Sie gilt als geknackt und sollte nicht mehr verwendet werden. Heute nutzt man WPA2 oder WPA3."},
{frage:"Welche WLAN-Verschluesselung gilt aktuell als sicher?",antworten:["WEP","WPA2 oder WPA3","Keine Verschluesselung","WLAN-Passwort-52"],richtig:1,erklaerung:"WPA2 ist aktuell der verbreitete Standard, WPA3 ist der neuere Nachfolger mit verbesserter Sicherheit. WEP und WPA gelten als unsicher und sollten nicht mehr verwendet werden."},
{frage:"Was ist der Unterschied zwischen einem Hub und einem Switch?",antworten:["Ein Hub ist schneller","Ein Switch leitet Daten gezielt an den Empfaenger, ein Hub an alle","Beide sind identisch","Ein Switch sendet nur ans Internet"],richtig:1,erklaerung:"Ein Hub schickt jedes Datenpaket an alle angeschlossenen Geraete, was zu viel Verkehr und Sicherheitsrisiken fuehrt. Ein Switch kennt die Zieladresse und sendet nur an den richtien Empfaenger und spart so Bandbreite."},
{frage:"Was ist eine MAC-Adresse?",antworten:["Ein Betriebssystem","Ein Passwort","Ein Browser-Typ","Die eindeutige Hardware-Adresse einer Netzwerkkarte"],richtig:3,erklaerung:"Die MAC-Adresse (Media Access Control) ist die fest eingebaute, eindeutige Adresse einer Netzwerkkarte. Sie besteht aus 6 Byte, z.B. 00:1A:2B:3C:4D:5E. Im Gegensatz zur IP-Adresse ist sie an die Hardware gebunden."},
{frage:"Was ist DHCP?",antworten:["Ein Dienst, der Geraeten automatisch IP-Adressen zuweist","Ein Backup-Programm","Ein Antiviren-Dienst","Ein Browser"],richtig:0,erklaerung:"DHCP (Dynamic Host Configuration Protocol) weist im Netzwerk automatisch IP-Adressen zu. Ohne DHCP muesste man jedem Geraet manuell eine IP-Adresse vergeben."},
{frage:"Was ist NAT?",antworten:["Ein Schliessmechanismus","Ein Backup-Verfahren","Ein Antiviren-Standard","Uebersetzung von privaten IP-Adressen in eine oeffentliche"],richtig:3,erklaerung:"NAT (Network Address Translation) versteckt mehrere private IP-Adressen hinter einer oeffentlichen. So kann ein ganzer Haushalt eine oeffentliche IP-Adresse teilen. Noetig wegen Knappheit an IPv4-Adressen."},
{frage:"Was ist ein Port in einem Netzwerk?",antworten:["Ein Browser-Name","Ein Stromanschluss","Ein Tastatur-Stecker","Eine Kanal-Nummer fuer eine bestimmte Art von Netzwerkverkehr"],richtig:3,erklaerung:"Ports sind Nummern von 0 bis 65535, die Anwendungen auf einem Geraet unterscheiden. Beispiel: Webserver nutzen Port 80 (HTTP) oder 443 (HTTPS). Eine Firewall kann bestimmte Ports blockieren."},
{frage:"Welchen Port nutzt HTTPS standardmaessig?",antworten:["25","80","21","443"],richtig:3,erklaerung:"HTTPS nutzt Port 443, HTTP nutzt 80, FTP 21, SMTP 25. Die Portnummer ermoeglicht es einem Server, verschiedene Dienste auf der gleichen IP-Adresse anzubieten."},
{frage:"Welchen Port nutzt FTP standardmaessig?",antworten:["443","80","21","53"],richtig:2,erklaerung:"FTP nutzt Port 21 fuer Steuerung, Datenverkehr nutzt Port 20 oder passive Ports. Port 80 ist HTTP, 443 ist HTTPS, 53 ist DNS."},
{frage:"Welchen Port nutzt DNS?",antworten:["53","80","443","21"],richtig:0,erklaerung:"DNS nutzt Port 53 (meist UDP, seltener TCP). DNS-Anfragen sind klein und schnell, daher kommt meist UDP zum Einsatz."},
{frage:"Was ist SSH?",antworten:["Ein Protokoll fuer sichere Fernsteuerung ueber ein Netzwerk","Ein Antivirenprogramm","Ein Browser","Ein Backup-Standard"],richtig:0,erklaerung:"SSH (Secure Shell) erlaubt sicheres Anmelden und Ausfuehren von Befehlen auf einem entfernten Computer. Die Verbindung ist verschluesselt, im Gegensatz zu aelteren Telnet. Typischer Port: 22."},
{frage:"Was ist FTP?",antworten:["Ein Browser","Ein verschluesseltes Remote-Protokoll","Ein Protokoll zum Uebertragen von Dateien","Ein Betriebssystem"],richtig:2,erklaerung:"FTP (File Transfer Protocol) uebertraegt Dateien zwischen Client und Server. Es ist unsicher, da es Passwoerter im Klartext sendet. Sichere Alternative: SFTP oder FTPS."},
{frage:"Was ist SMTP?",antworten:["Ein Backup-Protokoll","Protokoll zum Empfangen von E-Mails","Protokoll zum Senden von E-Mails","Ein Browser"],richtig:2,erklaerung:"SMTP (Simple Mail Transfer Protocol) sendet E-Mails. Empfangen tut man mit POP3 oder IMAP. SMTP nutzt Port 25 oder 587, mit Verschluesselung 465."},
{frage:"Was ist der Unterschied zwischen POP3 und IMAP?",antworten:["IMAP laesst E-Mails auf dem Server, POP3 laedt sie herunter und loescht sie","POP3 ist sicherer","IMAP ist aelter","Es gibt keinen Unterschied"],richtig:0,erklaerung:"POP3 laedt E-Mails herunter und loescht sie meist vom Server. IMAP verwaltet E-Mails serverseitig, sodass man auf mehreren Geraeten synchronisierte Ordner hat."},
{frage:"Was ist URL?",antworten:["Ein Schliessprotokoll","Ein_BROWSERtyp","Die Adresse einer Ressource im Web","Ein Firewall-Standard"],richtig:2,erklaerung:"URL (Uniform Resource Locator) ist die Adresse einer Ressource, z.B. https://beispiel.de/seite.html. Sie besteht aus Schema (https), Domain und Pfad zur Datei."},
{frage:"Was bedeutet DNS?",antworten:["Data Name System","Domain Network Standard","Database Network Service","Domain Name System"],richtig:3,erklaerung:"DNS wandelt Domain-Namen wie 'google.com' in IP-Adressen um. Ohne DNS muesste man IP-Adressen als Webadressen merken. DNS-Server sind wie das Telefonbuch des Internets."},
{frage:"Was macht das HTTP-Protokoll?",antworten:["Es verschluesselt alle Daten","Es uebertraegt Webseiten ohne Verschluesselung","Es loescht alle Verbindungen","Es installiert Software"],richtig:1,erklaerung:"HTTP (HyperText Transfer Protocol) uebertraegt Webseiten im Klartext. Heute sollte HTTPS verwendet werden, da es die Verbindung verschluesselt und so Datendiebstahl erschwert."},
{frage:"Was ist ein SSL/TLS-Zertifikat?",antworten:["Ein Browser-Add-on","Ein Passwort","Ein Backup-USB","Eine digitale Bescheinigung, die eine Webseite identifiziert und Verschluesslung ermoeglicht"],richtig:3,erklaerung:"Ein SSL/TLS-Zertifikat bestaetigt die Identitaet einer Webseite und ermoeglicht verschluesselte HTTPS-Verbindungen. Benuer erkennen es am Schloss-Symbol im Browser."},
{frage:"Was ist ein Plugin im Browser?",antworten:["Ein Zusatzprogramm mit zusaetzlichen Funktionen","Ein Betriebssystem","Ein Virenscanner","Ein Druckertreiber"],richtig:0,erklaerung:"Plugins erweitern den Browser um zusaetzliche Funktionen wie PDF-Anzeige oder Werbeblocker. Security-gruende modernen Browser reduzieren Plugins, viele Funktionen sind mittlerweile nativ eingebaut."},
{frage:"Was ist ein Browser-Cache genau?",antworten:["Ein Backup","Ein Virenscanner","Ein Zwischenspeicher fuer geladene Webinhalte","Ein Benuerkonto"],richtig:2,erklaerung:"Der Cache speichert Bilder, CSS- und JavaScript-Dateien, fuer Webseiten schneller zu laden. Leeren des Caches zwingt den Browser, frische Versionen zu laden, was bei Update Problemen hilft."},
{frage:"Was ist ein Webserver?",antworten:["Ein Browser-Typ","Ein Server, der Webseiten an Browser ausliefert","Ein Router-Modell","Ein Antivirenprogramm"],richtig:1,erklaerung:"Webserver wie Apache, nginx oder IIS warten auf ankommende HTTP/HTTPS-Anfragen und senden die angeforderten Webseiten an den Browser des Benuers aus. Sie laufen typischerweise als Dienst Port 80/443."},
{frage:"Was ist der Unterschied zwischen HTTP GET und POST?",antworten:["GET holt Daten, POST sendet Daten zum Server","Beides ist identisch","POST ist schneller","GET verschluesselt Daten"],richtig:0,erklaerung:"GET fordert Daten vom Server an und sicht Parameter in der URL. POST sendet Daten an den Server, z.B. Formulareingaben, im Body und sollte sensiblere Daten verwenden."},
{frage:"Was ist ein Domainname?",antworten:["Ein Browser-Plugin","Ein Server-Typ","Die textuelle Adresse einer Webseite wie 'wikipedia.org'","Ein Betriebsystem"],richtig:2,erklaerung:"Ein Domainname ist die menschenlesbare Bezeichnung einer Webseite. Er wird per DNS in eine IP-Adresse uebersetzt und ist viel leichter zu merken als eine Nummer."},
{frage:"Was bedeutet TLD?",antworten:["Ein Browser-Plugin","Top Level Domain, der letzte Teil einer Webadresse, z.B. .de","Ein Virenscanner","Ein Netzwerkgeraet"],richtig:1,erklaerung:"Die TLD ist der hinterste Teil einer Domain, z.B. '.de' fuer Deutschland, '.com' kommerziell, '.org' Organisation. Weiter gibt es neue TLDs wie .shop oder .blog."},
{frage:"Was ist eine Subdomain?",antworten:["Ein Browser-Plugin","Ein vorangestellter Teil vor der Hauptdomain, z.B. 'blog.beispiel.de'","Ein Server mit WLAN","Ein Antivirenprogramm"],richtig:1,erklaerung:"Eine Subdomain ist ein vorangestellter Teil der Domain wie 'blog.beispiel.de'. Sie organisiert Unterbereiche einer Hauptdomain und kann getrennte Webseiten oder Dienste auf demselben Server beheimaten."},
{frage:"Was ist ein Benuerkonto?",antworten:["Ein Router","Eine Hardware","Eine Identitaet im System mit eigenen Rechten und Einstellungen","Ein Server"],richtig:2,erklaerung:"Ein Benuerkonto trennt Identitaeten auf einem Computer, mit eigenen Dateien, Einstellungen und Rechten. So koennen mehrere Personen einen Computer nutzen, ohne ihre Daten zu teilen."},
{frage:"Was bewirkt das Attribut readonly in einem Eingabefeld?",antworten:["Das Feld wird geloescht","Das Feld laesst sich nicht aendern, aber der Wert wird mitgesendet","Das Feld ist unsichtbar","Das Feld wird verschluesselt"],richtig:1,erklaerung:"readonly zeigt den Wert an und sendet ihn beim Absenden mit, aber der Benuer kann ihn nicht aendern. Im Gegensatz zu disabled bleibt das Feld aber auch per Tab ansteuerbar und wird mitgesendet."},
{frage:"Was bedeutet das disabled-Attribut in einem Eingabefeld?",antworten:["Das Feld ist ausgegraut und wird beim Absenden nicht gesendet","Das Feld ist sichtbar und gesperrt","Das Feld ist gelb hinterlegt","Das Feld wird mitgeschickt"],richtig:0,erklaerung:"disabled deaktiviert das Feld; es wird ausgegrauert und beim Absenden des Formulars nicht mitgesendet. Fuer reine Anzeige ohne Mitgnuse readonly verwenden."},
{frage:"Welches input-Element erzeugt einen Absenden-Button?",antworten:["type='checkbox'","type='text'","type='submit'","type='password'"],richtig:2,erklaerung:"type='submit' erzeugt einen Button, der beim Klick das Formular absendet. type='button' ist ein neutraler Button, der nur per JavaScript eine Aktion ausloest, ohne das Formular abzuschicken."},
{frage:"Welches input-Element erzeugt eine Auswahl-Checkbox?",antworten:["type='password'","type='radio'","type='text'","type='checkbox'"],richtig:3,erklaerung:"Eine Checkbox ermoeglicht Mehrfachauswahl. Radio-Buttons (type='radio') mit gleichem name-Attribut erlauben nur eine Auswahl im Satz. Checkboxen erlauben ein- und auszuschalten fuer eine Option."},
{frage:"Welches HTM-Tag erzeugt einen Zeilenumbruch im Text?",antworten:["<br>","<p>","<div>","<span>"],richtig:0,erklaerung:"<br> erzeugt einen Manualen-Zeilenumbruch. Es ist ein leeres Tag ohne schliessendes Element. Fuer Absaetze verwendet man <p>, fuer groessere Bloecke <div>."},
{frage:"Welches HTML-Tag erzeugt eine Tabelle?",antworten:["<table>","<div>","<p>","<list>"],richtig:0,erklaerung:"<table> erzeugt eine Tabelle. Innerhalb gibt es <tr> fuer Tabellenzeile, <td> fuer Zelle und <th> fuer Kopfzelle. Tabellen sollten nur fuer tabellerische Daten verwendet werden, nicht fuer Layout."},
{frage:"Was ist ein Cookie-SameSite-Attribut?",antworten:["Loescht Cookies beim Schliessen","Verschluesselt Cookies","Verhindert, dass Cookies bei Cross-Site-Anfragen gesendet werden","Verkleinert Cookies"],richtig:2,erklaerung:"SameSite verhindert, dass Cookies bei Cross-Site-Anfragen gesendet werden, was CSRF-Angriffe erschwert. Werte: Strict (nur fuer Same-Site), Lax (Voreinstellung moderner Browser), None (Cookies muessen Secure sein)."},
{frage:"Was ist SQL?",antworten:["Ein Betriebssystem","Eine Programmiersprache fuer Browser","Eine Sprache zur Steuerung von Datenbanken","Ein Virenscanner"],richtig:2,erklaerung:"SQL (Structured Query Language) liest, aendert und verwaltet Daten in relationalen Datenbanken. Beispielsweise 'SELECT * FROM kunden' gibt alle Datensaetze aus der Tabelle kunden zurueck."},
{frage:"Was bedeutet SQL-Injection?",antworten:["EineBackup-Strategie","Ein Angriff ueber boeswillige SQL-Befehle in Eingabefeldern","Ein Antiviren-Standard","Ein Browser-Plugin"],richtig:1,erklaerung:"SQL-Injection schleust boeswillige SQL-Befehle ueber ungesicherte Formulare ein. Abhilfe schaffen 'Prepared Statements', die Eingaben von SQL trennen und das Script vor manipulation schuetzen."},
{frage:"Was ist ein relationaler Datenbank?",antworten:["Eine Datenbank mit Tabellen, die ueber Schluessel verbunden sind","Eine Datenbank ohne Struktur","Ein Browser","Ein Betriebssystem"],richtig:0,erklaerung:"In einer relationalen Datenbank (z.B. MySQL, PostgreSQL) liegen Daten in Tabellen mit Zeilen und Spalten. Tabellen sind ueber Primaer- und Fremdschluessel miteinander verbunden."},
{frage:"Was ist ein Primaerschluessel in einer Datenbank?",antworten:["Eine Verschluesselung","Ein eindeutiger Schluessel fuer jede Tabellenzeile","Ein Passwort","Ein Backup"],richtig:1,erklaerung:"Der Primaerschluessel identifiziert jeden Datensatz eindeutig, z.B. eine Kundennummer. Ohne Primaerschluessel koennen Datensaetze nicht eindeutig referenziert oder aktualisiert werden."},
{frage:"Was ist ein Fremdschluessel in einer Datenbank?",antworten:["Verweis auf den Primaerschluessel einer anderen Tabelle","Eine Art Passwort","Ein Fehler","Ein Backup"],richtig:0,erklaerung:"Ein Fremdschluessel ist eine Spalte, die auf den Primaerschluessel einer anderen Tabelle verweist. So entstehen Beziehungen zwischen Tabellen, z.B. Kunde zu Bestellung."},
{frage:"Was ist JSON?",antworten:["Ein textueller Daten-Austauschstandard","Ein Browser-Plugin","Ein Betriebssystem","Ein Antivirenprogramm"],richtig:0,erklaerung:"JSON (JavaScript Object Notation) ist ein kompaktes Datenformat zum Austausch zwischen Anwendungen. Es ist menschen- und maschinenlesbar, leichtgewichtig und wird in der modernen Webentwicklung verbreitet genutzt."},
{frage:"Was ist XML?",antworten:["Ein Schliessprotokoll","Ein Browser-Typ","Ein Betriebssystem","Eine Auszeichnungssprache fuer strukturierte Dokumente"],richtig:3,erklaerung:"XML (eXtensible Markup Language) ist eine Metasprache fuer strukturierte Dokumente. Sie ist aehnlich wie HTML, aber Tags koennen selbst definiert werden. Verwendet in Konfiguration, Dokument-Austausch und Office-Formaten."},
{frage:"Was ist der Unterschied zwischen JSON und XML?",antworten:["JSON ist leichtgewichtiger und fuer Web, XML ist ausdruckmaessiger und flexibler","XML ist neuer","JSON ist verschluesselt","Es gibt keinen Unterschied"],richtig:0,erklaerung:"JSON ist kompakt und fuer Web-Anwendungen gedacht, XML ist ausdruckmaessiger und unterstuetzt komplexere Strukturen, Metadaten und Schemata. Web-APIs verwenden heute meist JSON."},
{frage:"Was bedeutet API?",antworten:["Ein Antivirenprogramm","Application Programming Interface - Programmierschnittstelle","Ein Browser-Plugin","Ein Backup-Typ"],richtig:1,erklaerung:"Eine API ermoeglicht Programmen, miteinander zu kommunizieren. Web-APIs liefern Daten z.B. fuer Wetter, Karten oder Zahlungen ueber definierte Aufrufe, die eigene Anwendungen nutzen koennen."},
{frage:"Was ist ein Web-API?",antworten:["Ein Betriebssystem","Eine Schnittstelle ueber HTTP, die Daten an Anwendungen liefert","Ein Antivirenprogramm","Ein Browser-Plugin"],richtig:1,erklaerung:"Ein Web-API eroeffnet Programmen Zugriff auf Daten oder Funktionen ueber HTTP. Beispiele: Wetter-APIs, Twitter-API, Zahlungs-APIs. Wird heute meist ueber JSON-Form geliefert."},
{frage:"Was ist der Zweck von HTTPS gegenueber HTTP?",antworten:["Kompression von Dateien","Schnellerue Datenuebertragung","Loeschen von Verbindungen","Verschluesselung der Verbindung"],richtig:3,erklaerung:"HTTPS verschluesselt die Verbindung zwischen Browser und Server. Das schuetz Passwoerter, persoenliche Informationen und Zahlungen. Es ist heute Standard und praegt ein Rankingsignal der Suchmaschine."},
{frage:"Was ist ein Server-Zertifikat ohne Kette?",antworten:["Ein Backupsystem","Ein Zertifikat, das ohne Kette eine direkte Verbindung hat","Ein Antivirenprogramm","Ein Browser-Sperr-System"],richtig:1,erklaerung:"Ein Server-Zertifikat ohne Zwischen-Zertifikate (Chain) wird als direct trust verwendet. Normalerweise enthaelt ein Server-Zertifikat eine Kette von Zwischen- und Wurzelzertifikaten, die der Browser als vertrauenswuerdigkeit anerkennt."},
{frage:"Was ist eine session bei einem Webserver?",antworten:["Ein Virenscanner","Eine Speichertechnik","Eine WebView aufgerufen als eigener Prozess von Chrome, um Viren auszufuehren","Ein Backup-Programm"],richtig:2,erklaerung:"Session nennt man eine Benuersitzung, die meist mit einem Session-Cookie identifiziert wird und serverseitig mit Daten wie Login-Status und Warenkorb verknuepft ist."},
{frage:"Was ist eine serverseitige Anwendung?",antworten:["Ein Druckertreiber","Ein Browser","Ein Antivirenprogramm","Programm, das auf dem Server laeuft und Ergebnisse zum Browser liefert"],richtig:3,erklaerung:"Serverseitige Programme laufen auf dem Server (z.B. PHP, Python, Node.js). Sie greifen auf Datenbanken zu und erzeugen HTML, das an den Browser geliefert wird. Der Client bekommt nur fertiges HTML."},
{frage:"Was ist eine clientseitige Anwendung?",antworten:["Programm auf dem Online-Server","Programm, das im Browser des Benuers laeuft","Ein Antivirenprogramm","Ein Druckertreiber"],richtig:1,erklaerung:"Clientseitige Programme laufen im Browser (z.B. JavaScript). Sie reagieren auf Benuereingaben, ohne zum Server zu wechseln, und koennen die Oberflaeche schnell aktualisieren."},
{frage:"Was ist ein Kompilier-Vorgang bei Programmen?",antworten:["Ein Antiviren-Scan","Uebersetzung des Quellcodes in maschinenlesbaren Code","Ein Backup","Ein Netzwerkprozess"],richtig:1,erklaerung:"Beim Kompilieren wird Queltext eines Programms in vom Prozessor ausfuehrbaren Code uebersetzt. Sprachen wie C oder C++ werden kompiliert, JavaScript hingegen interpretiert."},
{frage:"Was ist ein Interpreter?",antworten:["Ein Server","Ein Antivirenprogramm","Ein Programm, das Quellcode Zeile fuer Zeile ausfuehrt","Ein Backup-Programm"],richtig:2,erklaerung:"Ein Interpreter fuehrt den Quellcode direkt aus, ohne ihn vorher in Maschinensprache zu kompilieren. JavaScript und Python werden interpretiert. Vorteil: schnelle Aenderungen, Nachteil: langsamere Ausfuehrung."},
{frage:"Was ist Open Source?",antworten:["Ein Schliessprotokoll","Kostenlose kommerzielle Software","Virensoftware","Software deren Quellcode oeffentlich ist und von jedem eingesehen/geaendert werden darf"],richtig:3,erklaerung:"Open-Source-Software hat einen oeffentlichen Quellcode, den jeder anschauen, pruefen und verbessern kann. Beispiele: Linux, Firefox, LibreOffice. Das erhoeht Sicherheit und Entwicklungsgeschwindigkeit."},
{frage:"Was bedeutet freie Software?",antworten:["Kostenlose Demoversion","Kostenlose Software nur fuer Privatkunden","Software, die vom Benuer frei verwendet, studiert, geaendert und geteilt werden darf","Shareware"],richtig:2,erklaerung:"Freie Software garantiert Freiheiten: Nutzung, Studium, Aenderung und Weitergabe des Quellcodes. Open Source ist verwandt, betont aber mehr die wirtschaftlichen Vorteile als Freiheiten des Benuers."},
{frage:"Was ist ein proprietorisches Betriebssystem?",antworten:["Ein Linux-System","Ein freies Betriebssystem","Ein Open-Source-Betriebssystem","Betriebssystem, das einer Firma gehoert und dessen Quellcode nicht oeffentlich ist"],richtig:3,erklaerung:"Proprietorische Systeme sind z.B. Windows und macOS. Der Quellcode ist geheim, Benuer koennen ihn nicht pruefen oder aendern. Im Gegensatz dazu steht Open-Source-Software wie Linux."},
{frage:"Was ist Linux?",antworten:["Ein Server-Router","Ein Antivirenprogramm","Ein Browser","Ein freies, quelloffenes Betriebssystem"],richtig:3,erklaerung:"Linux ist ein freies Betriebssystem, das von Linus Torvalds 1991 veroeffentlicht wurde. Es ist Open Source und wird weltweit auf Servern, Smartphones (Android nutzt Linux-Kernel) und Produktionsservern genutzt."},
{frage:"Welche Linux-Distribution wird fuer Anfaenger empfohlen?",antworten:["Ubuntu","Kali Linux","Android","Windows"],richtig:0,erklaerung:"Ubuntu gilt als eine Distribution fuer Anfaenger mit grosser Community und.Support und einfachem Installer. Kali ist fuer Sicherheitstests, Debian fuer stabile Server, Arch fuer Fortgeschrittene."},
{frage:"Was ist der Linux-Kernel?",antworten:["Ein Browser","Der Kern des Betriebssystems, verwaltet Hardware und Ressourcen","Ein Virenscanner","Ein Backup"],richtig:1,erklaerung:"Der Kernel ist der Kern des Linux-Betriebssystems. Er verwaltet CPU, Speicher, Treiber und Prozesse. Das, was der Benuer sieht (Oberflaeche, Programme), liegt in Schichten ueber dem Kernel."},
{frage:"Was ist der Windows Defender?",antworten:["Ein Browser","Integrierter Virenscanner von Windows","Ein Linux-Kernel","Ein Backup-System"],richtig:1,erklaerung:"Windows Defender (Microsoft Defender) ist der integrierte Virenscanner von Windows. Er bietet Basisschutz und ist automatisch aktiv, kann aber durch andere Antivirenprogramme ergaenzt oder ersetzt werden."},
{frage:"Was ist Spyware?",antworten:["Schadsoftware, die heimlich Daten ausspioniert","Ein Backup-Programm","Ein Browser-Plugin","Ein Server"],richtig:0,erklaerung:"Spyware sammelt heimlich Informationen über das Opfer: Surfgewohnheiten, Passwoerter, Kontodaten. Sie wird oft zusammen mit anderen Programmen installiert. Antispyware-Tools und Browser-Hygiene koennen helfen."},
{frage:"Was ist Adware?",antworten:["Ein Server","Ein Virenscanner","Software, die unaufgefordert Werbung einblendet","Ein Backup"],richtig:2,erklaerung:"Adware blendet Werbung ein, oft nach Installation von Free-Programmen. Sie kann annoying sein, ist aber nicht unbedingt schaedlich. Vertrauenswuerdige Benuer sollten Quellen pruefen und piggybacks vermeiden."},
{frage:"Was ist ein Wurm?",antworten:["Selbststaendig sich verbreitende Schadsoftware","Ein nuetzliches Programm","Ein Virenscanner","Ein Browser"],richtig:0,erklaerung:"Ein Wurm verbreitet sich selbsttaetig ueber Netzwerke, ohne ein Trrojanisches Wirtprogramm. Er nutzt Sicherheitsluecken aus und kann sich schnell verbreiten. Beispiele: Stuxnet, Conficker."},
{frage:"Was ist eine Zero-Day-Luecke?",antworten:["Ein Virenscanner-Update","Eine Sicherheitsluecke, die noch nicht vom Hersteller geschlossen ist","Ein Browser-Update","Ein Backup"],richtig:1,erklaerung:"Eine Zero-Day-Luecke ist unbekannt und der Hersteller hat noch keinen Patch. Der Begriff kommt, dass der Hersteller null Tage Zeit blieb, um das Problem zu schliessen. Sie sind gefuerchtet, weil sie aktiv ausgenutzt werden koennen."},
{frage:"Was ist Social Engineering?",antworten:["Ein Backup-Verfahren","Psychologische Manipulation, um Zugang zu Informationen zu erhalten","Ein Netzwerk-Standard","Ein Browser-Plugin"],richtig:1,erklaerung:"Social Engineering nutzt menschliche Schwachstellen, nicht technische. Beispiele: Telefonanrufe als 'IT-Support', gefaelschte E-Mails. Benuerschulung und Skepsis sind die besten Schutzmechanismen."},
{frage:"Was ist ein Botnet?",antworten:["Ein Netzwerk aus infizierten Computern, die von Angreifern ferngesteuert werden","Ein Netzwerk von Scanner-Diensten","Ein Browser-Name","Ein sicherer Chat-Client"],richtig:0,erklaerung:"Ein Botnet besteht aus vielen infizierten Computern (Bots), die von einem Angreifer gesteuert werden. Sie koennen fuer DDoS-Angriffe, Spam-Versand oder Krypto-Mining genutzt werden, ohne dass der Benuer es merkt."},
{frage:"Was ist ein DDoS-Angriff?",antworten:["Eine Server ueberlastet mit vielen Anfragen von verteilten Rechnern","Eine Antiviren-Aktualisierung","Ein Backup","Ein Update"],richtig:0,erklaerung:"Bei einem DDoS-Angriff (Distributed Denial of Service) overlaedt ein Angreifer einen Server mit so vielen Anfragen, dass er fuer reguläre Benuer nicht mehr erreichbar ist. Botnets werden oft dafuer genutzt."},
{frage:"Was ist das Ziel einer Firewall?",antworten:["Verkehr filtern und unerlaubte Verbindungen blockieren","Dateien komprimieren","Datenbanken erstellen","Programme installieren"],richtig:0,erklaerung:"Eine Firewall filtert Datenverkehr anhand von Regeln: Welche IP, welcher Port, welches Protokoll darf passieren. Sie trennt Netzwerke und blockt unerlaubte Zuegriffe, ist aber kein Allheilmittel."},
{frage:"Was ist das Backintippen von Passwoertern?",antworten:["Passwoerter merken","Sichere Passwoerter nicht mehrfach verwenden","E-Mail-Adresse speichern","Immer Passwoerter tilgen"],richtig:1,erklaerung:"Wiederverendung von Passwoertern ist riskant: Ist eine Seite geknackt, probieren Angreifer das gleiche Passwort woanders. Ein Passwort-Manager singleton-erzeugt verschiedene, starke Passwoerter fuer jeden Dienst."},
{frage:"Was ist ein Passwort-Manager?",antworten:["Programm, das alle Passwoerter sicher verwahrt und automatisch eingibt","Ein Browser","Ein Backup-System","Ein Antivirenprogramm"],richtig:0,erklaerung:"Passwort-Manager wie Bitwarden oder KeePass speichern alle Passwoerter verschluesselt in einem Tresor. Man muss sich nur noch ein Master-Passwort merken. Das erhoeht Sicherheit enorm, da jeder Dienst ein eigenes Passwort hat."},
{frage:"Wie lang sollte ein ausreichend sicheres Passwort mindestens sein?",antworten:["12 Zeichen","3 Zeichen","5 Zeichen","immer 7 Zeichen"],richtig:0,erklaerung:"Moderne Empfehlungen raten mindestens 12 Zeichen, besser mehr. Laenge ist wichtiger als Sonderzeichen. Eine Passphrase wie 'Korrektes-Pferd-akku-steg' ist leicht zu merken und sicher."},
{frage:"Was ist ein Rainbow Table?",antworten:["Ein Schliesssystem","Ein Browser","Vorgefertigte Tabelle mit Hash-Werten, um Passwoerter zu knacken","Ein Backupsystem"],richtig:2,erklaerung:"Ein Rainbow Table ist eine Tabelle mit vorausberechneten Hashes, die das Knacken von Passwoertern beschleunigt. Mit 'Salt' kann man das vereiteln, da die Hashes pro Benuer unterschiedlich werden."},
{frage:"Was ist Hashing?",antworten:["Verwandeln von Daten in eine eindeutige Zeichenfolge fester Laenge","Loeschen von Daten","Komprimieren von Dateien","Speichern von Daten"],richtig:0,erklaerung:"Hash-Funktionen erzeugen aus beliebigen Daten einen eindeutigen Fingerabdruck fester Laenge, z.B. SHA-256. Wird eine Datei geaendert, aendert sich der Hash. So kann man Manipulationen erkennen oder Passwoerter speichern, ohne sie im Klartext zu speichern."},
{frage:"Was bedeudet MD5 in der IT?",antworten:["Ein Browser-Add-on","Eine veraltete Hashfunktion, heute als unsicher eingestuft","Ein Backup-Standard","Ein Netzwerkgeraet"],richtig:1,erklaerung:"MD5 war eine haeufig genutzte Hash-Funktion, gilt aber seit Langem als unsicher, da verschiedene Eingaben denselben Hash erzeugen koennen (Kollisionen). Heute nutzt man SHA-256 oder bessere."},
{frage:"Was ist ein Bit?",antworten:["Eine Maßeinheit","Ein Computer-Teil","Die kleinste digitale Einheit, Wert 0 oder 1","Ein Spieletitel"],richtig:2,erklaerung:"Ein Bit ist die kleinste Informationseinheit in der Digitaltechnik und kann 0 oder 1 annehmen. 8 Bit ergeben 1 Byte, 1024 Byte ein Kilobyte."},
{frage:"Wie viele Bit sind ein Byte?",antworten:["16 Bit","10 Bit","4 Bit","8 Bit"],richtig:3,erklaerung:"1 Byte besteht aus 8 Bit. Damit lassen sich 256 verschiedene Werte darstellen (0-255). In Bytes werden Dateigroessen und Speicherkapazitaet angegeben."},
{frage:"Was ist ein Kilobyte (KB)?",antworten:["1000 Byte","1024 Byte","512 Byte","256 Byte"],richtig:1,erklaerung:"In der IT sind 1 KB traditionell 1024 Byte, da Systeme binaer arbeiten. Dezimal nach SI sind 1 kB = 1000 Byte, zur Klaerung nut man KiB fuer 1024 Byte, MiB fuer 1024 KiB."},
{frage:"Wie viele Megabyte sind 1 Gigabyte?",antworten:["1000 MB","1024 MB","512 MB","100 MB"],richtig:1,erklaerung:"1 GB sind 1024 MB. Die Hersteller von Speichermedien geben oft 1000 MB an, das Betriebssystem rechnet binaer mit 1024. Deshalb sieht eine '500-GB-Festplatte' im System weniger GB aus."},
{frage:"Was ist ein Terabyte (TB)?",antworten:["10 MB","1024 MB","100 GB","1024 GB"],richtig:3,erklaerung:"1 TB sind 1024 GB. Moderne Festplaten haben oft 1-8 TB Speicherkapazitaet. Server-Speicher kann ins Petabyte reichen. Groessenordnung: 1 TB = 1024 GB = ca. 1.000.000.000.000 Byte."},
{frage:"Welches Betriebssystem gibt es fuer Smartphones von Google?",antworten:["iOS","Android","Windows Phone","Symbian"],richtig:1,erklaerung:"Android ist das Open-Source-Betriebssystem von Google, das auf Linux basiert. Es ist das verbreitetste Smartphone-Betriebssystem. Apple nutzt iOS, welches nur auf iPhones und iPads laeuft."},
{frage:"Welches Betriebssystem fuer iPhones ist von Apple?",antworten:["BlackBerry OS","Android","Windows","iOS"],richtig:3,erklaerung:"iOS ist das Betriebssystem von Apple fuer iPhones. Es ist geschlossen und exakt auf Apples Hardware abgestimmt, im Gegensatz zu Android, das auf Geraete verschiedener Hersteller laeuft."},
{frage:"Was ist der App Store?",antworten:["Ein Virenscanner","Ein Browser","Ein Backup-Dienst","Plattform zum sicheren Herunterladen von Apps fuer iOS-Geraete"],richtig:3,erklaerung:"Apples App Store bietet zusaetzliche Apps fuer iOS an. Apple prueft jedes Programm vor der Aufnahme, was zur Sicherheit beitraegt. Google heisst der Pendant Play Store fuer Android."},
{frage:"Was ist der Google Play Store?",antworten:["Ein Browser","Plattform zum sicheren Herunterladen von Apps fuer Android-Geraete","Ein Antivirenprogramm","Ein Server"],richtig:1,erklaerung:"Der Play Store ist die offizielle App-Plattform fuer Android. Google prueft Apps, aber nicht so strikt wie Apple. Trojaner und Adware koennen trotzdem durchkommen, deshalb sollte man Bewertungen und Berechtigungen pruefen."},
{frage:"Welche Berechtigung sollte eine Taschenlampen-App sinnvollerweise nicht benoetigen?",antworten:["Adresse, Kontakte oder Mikrofon","Kamera-LED","Kamera-Vorschau","Display-Helligkeit"],richtig:0,erklaerung:"Eine Taschenlampe braucht nur die Kamera-LED, aber keine Kontakte, Standort oder Mikrofon. Zu viele Berechtigungen sind ein Warnsignal fuer Spyware oder Adware. Apps sollten nur preguntas Berechtigungen bekoemmrechen."},
{frage:"Was ist ein Firmware-Update?",antworten:["Update fuer die Software, direkt in Geraeten eingebettet ist","Programm-Update","Antiviren-Update","Browser-Update"],richtig:0,erklaerung:"Firmware ist die Software, die direkt in Geraetekommunikation mit der Hardware steuert (z.B. in Routern, Druckern, Kameras). Firmware-Updates sind wichtig, weil sie Sicherheitsluecken in Geraeten schliessen koennen."},
{frage:"Warum sollte man den Router aktuell halten?",antworten:["Um Programme zu sperren","Um Internet zu blockieren","Um WLAN zu loeschen","Um Sicherheitsluecken zu schliessen und Funktionen zu verbessern"],richtig:3,erklaerung:"Ein Router ist das Tor zum Internet und ein haeufiges Angriffsziel. Hersteller veroeffentlichen Firmware-Updates, um Luecken zu stopfen. Updates sollten automatisch oder regelmaessig installiert werden."},
{frage:"Was bewirkt das Aendern des Standard-Routerpassworts?",antworten:["Loescht alle Daten","Erhoeht das Internettempo","Schuetzt vor einfachen Angriffen ueber Standard-Credentials","Resets das System"],richtig:2,erklaerung:"Router haben oft Standardpasswoerter wie 'admin'/'admin'. Angreifer nutzen diese Standard-Credentials, um Router zu kapern. Deshalb immer ein starkes, einmaliges Passwort setzen."},
{frage:"Was ist ein Smartphone Hotspot?",antworten:["Ein Antivirenprogramm","Ein Virenscanner","Ein Browser","Mobilfunk-Internetverbindung fuer andere Geraete"],richtig:3,erklaerung:"Ein Hotspot teilt die Mobilfunk-Internetverbindung eines Smartphones mit anderen Geraeten via WLAN oder USB. Sinnvoll unterwegs, sollte aber mit Passwort gesichert sein, da Datenvolumen beschraenkt ist."},
{frage:"Was ist USB-C?",antworten:["Ein Netzwerk-Standard","Ein Antivirenprogramm","Ein Browser-Typ","Ein moderner Strom- und Datenstecker"],richtig:3,erklaerung:"USB-C ist ein symmetrischer Stecker, der in jeder Richtung eingesteckt werden kann. Er kann Daten und Strom uebertragen, auch DisplayPort oder Thunderbolt. Moderne Laptops und Smartphones nutzen USB-C."},
{frage:"Welches ist die haeufigste Speicherkarte in Smartphones?",antworten:["Memory Stick","SD","CompactFlash","microSD"],richtig:3,erklaerung:"microSD ist die kleinste Variante der SD-Karten und in Smartphones weit verbreitet. Sie erweitert den internen Speicher fuer Fotos, Videos und Apps. Es gibt verschiedene Geschwindigkeitsklassen, z.B. Class 10, UHS-I, UHS-II."},
{frage:"Was ist Bluetooth?",antworten:["Kabellose Funktechnik fuer kurze Distanzen","Ein Antivirenprogramm","Ein Browser-Plugin","Ein Virenscanner"],richtig:0,erklaerung:"Bluetooth verbindet Geraete ueber kurze Distanz (z.B. 10 m) kabellos. Es wird fuer Headsets, Lautsprecher, Tastaturen, Smartwatches genutzt. Es ist energiesparender als WLAN, aber mit geringerer Reichweite."},
{frage:"Welche Bluetooth-Variante ist besonders energiesparend?",antworten:["Bluetooth Low Energy (BLE)","Bluetooth Classic","Bluetooth-Schnurlos","Bluetooth-2.0-BleedingEdge"],richtig:0,erklaerung:"Bluetooth Low Energy (BLE) ist fuer Devices mit kleiner Batterie gedacht (z.B. Fitness-Tracker, Smart-Home-Sensoren). Er verbraucht deutlich weniger Strom als Classic-Blootooth und wird auch als Bluetooth Smart bezeichnet."},
{frage:"Was ist NFC?",antworten:["Kabellose Technik fuer aller-kleinste Distanzen, z.B. Bezahlen mit Smartphone","Ein Antivirenprogramm","Ein Browser","Ein Server"],richtig:0,erklaerung:"NFC (Near Field Communication) funktioniert ueber sehr kurze Distanz (cm) und wird fuer kontaktloses Bezahlen, Fahrkarten und Tag-Informationen genutzt. Es ist in modernen Smartphones integriert und mit Apple Pay oder Google Pay im Einsatz."},
{frage:"Was ist ein QR-Code?",antworten:["Ein Backup-Standard","Ein Browser","Ein Antivirenprogramm","Zweidimensionaler Code, der mit der Kamera gelesen wird"],richtig:3,erklaerung:"QR-Codes sind 2D-Codes die mit Smartphone kameras ausgelesen werden. Sie enthalten URLs, WLAN-Zuegangsdaten oder Kontakte. Achtung: Nicht jede URL im Code ist vertrauenswuerdig, pruefen vor dem Oeffnen."},
{frage:"Was ist die Cloud-Speicherung?",antworten:["Ein Browser","Ein Computerstecker","Speicherung von Daten auf entfernten Servern ueber das Internet","Ein Antivirenprogramm"],richtig:2,erklaerung:"Cloud-Speicher wie Google Drive, OneDrive, iCloud ermoeglichen Daten von ueberall zu speichern und zu teilen. Vorteile: Zugriff von ueberall, automatische Backups. Nachteile: Abhaengigkeit vom Internet und Anbieter, Privatsphaere."},
{frage:"Was ist der Unterschied zwischen einer lokalen Festplatte und der Cloud als Speicher?",antworten:["Lokal: schnell und ohne Internet, Cloud: ueberall zugaenglich und automatisch synchron","Beides ist identisch","Cloud ist immer schneller","Lokal ist immer unsicher"],richtig:0,erklaerung:"Lokale Festplatten sind schnell und ohne Internet zugaenglich. Cloud-Speicher ist ortunabhaengig, hat automatische Backups und synchronisiert mehrere Geraete. Kombination beider ist meist ideal."},
{frage:"Was ist ein NAS?",antworten:["Ein Antivirenprogramm","Netzwerkfestplatte, die mehreren Geraeten im Netzwerk zugaenglich ist","Ein Router","Ein Backup-Programm"],richtig:1,erklaerung:"NAS (Network Attached Storage) ist eine Festplatte, die direkt im Netzwerk zugaenglich ist. Mehrere Geraete koennen zentral Dateien speichern und teilen. Oft mit RAID fuer Ausfallsicherheit, eigenes Betriebssystem und Fernzugriff."},
{frage:"Was ist ein RAID?",antworten:["Ein Antivirenprogramm","Verbund von Festplatten fuer Ausfallsicherheit oder Geschwindigkeit","Ein Server","Ein Backup"],richtig:1,erklaerung:"RAID (Redundant Array of Independent Disks) kombiniert mehrere Festplatten zu einem logischen Laufwerk. RAID 1 spiegelt (Sicherheit), RAID 0 streifen (Geschwindigkeit, aber kein Schutz), RAID 5 kombiniert beides mit 3+ Platten."},
{frage:"Was ist das wichtigste Argument gegen ein einzelnes Backup?",antworten:["Backups dauern zu lange","Ein Backup ist nur eine Kopie - bei Verlust sind Daten weg","Backups sind teuer","Backups sind illegal"],richtig:1,erklaerung:"Ein Backup allein ist nicht genug: Wenn das Backup am gleichen Ort wie das Original ist, koennen Feuer, Wasser oder Diebstahl beide Daten zerstoeren. Deshalb die 3-2-1-Regel mit mindestens einer externen Kopie."},
{frage:"Was ist die Befehlszeile?",antworten:["Ein Server-Dienst","Ein Browser-Plugin","Ein Virenscanner","Texteingabe, um den Computer direkt zu steuern"],richtig:3,erklaerung:"In der Befehlszeile (Shell, Terminal, Eingabeaufforderung) steuert man den Computer per Text. Sie ist maechtig und schnell, erfordert aber Wissen. Unter Windows PowerShell, unter Linux Bash."},
{frage:"Was ist PowerShell?",antworten:["Ein Antivirenprogramm","Moderne Befehlszeile unter Windows","Ein Browser","Ein Linux-System"],richtig:1,erklaerung:"PowerShell ist eine erweiterte Befehlszeile von Windows, die Skripte und Automatisierung ermoeglicht. Sie ist Nachfolger der klassischen cmd-Eingabeaufforderung und arbeitet mit Objekten statt nur Text."},
{frage:"Was ist das Terminal unter Linux?",antworten:["Ein Virenscanner","Ein Browser","Ein Backup-Programm","Textfenster zur Ausfuehrung von Shell-Befehlen"],richtig:3,erklaerung:"Das Terminal oeffnet eine Shell (meist Bash), in der man Linux-Befehle eintippt. Es ist das wichtigste Werkzeug fuer Admins und Entwickler und ermoeglicht die volle Kontrolle ueber das System."},
{frage:"Was bedeutet der Befehl 'cd' in der Shell?",antworten:["Create Disk","Change Directory - wechselt das Verzeichnis","Compress Data","Copy Directory"],richtig:1,erklaerung:"cd wechselt das aktuelle Verzeichnis. 'cd /home/benuer' geht ins Home-Verzeichnis. 'cd..' eine Ebene hoeher. Es ist einer der haeufigsten Befehle in der Shell."},
{frage:"Was bedeutet der Befehl 'ls' unter Linux?",antworten:["Liest Speicher","Loescht Daten","Listet Dateien im aktuellen Verzeichnis auf","Startet System"],richtig:2,erklaerung:"ls zeigt alle Dateien und Ordner im aktuellen Verzeichnis. Parameter wie ls -l zeigen Details, ls -a zeigt auch versteckte Dateien. Unter Windows heisst der Befehl 'dir'."},
{frage:"Was bedeutet 'mkdir' in der Shell?",antworten:["Modify Data","Move Directory","Make Disk","Make Directory - erstellt ein neues Verzeichnis"],richtig:3,erklaerung:"mkdir erstellt ein neues Verzeichnis. 'mkdir photos' legt einen Ordner namens 'photos' an. Mit -p werden alle noetigen ueberordner erzeugt, z.B. mkdir -p reisen/2024/lissabon."},
{frage:"Was bewirkt der Befehl 'rm'?",antworten:["Erstellt eine Datei","Loescht Dateien oder Verzeichnisse","Liest eine Datei","Kopiert Dateien"],richtig:1,erklaerung:"rm (remove) loescht Dateien. rm -r loescht Verzeichnisse rekursiv inkl. Inhalt. Achtung: geloeschte Dateien unter Linux ohne weiteres nicht wiederherstellbar, rm -rf ist gefuerchtet, weil alles loescht ohne Nachfrage."},
{frage:"Was bedeutet 'sudo' unter Linux?",antworten:["Superuser do - fuehrt Befehl mit Administratorrechten aus","Superb Download","Save User Data","Stop Output"],richtig:0,erklaerung:"sudo fuehrt einen Befehl als root (Administrator) aus. z.B. sudo apt update. Es erfordert das Benuerpasswort. Es ist sicherer als direkt als root angemeldet zu sein, weil nur einzelne Befehle mit Root-Rechten laufen."},
{frage:"Was ist ein Git?",antworten:["Ein Backup-System","Ein Antivirenprogramm","Ein Browser","Versionskontroll-System zum Verfolgen von Dateiaenderungen"],richtig:3,erklaerung:"Git ist ein dezentrales Versionsverwaltungssystem. Es speichert Versionen von Dateien, ermoeglicht协作 collaboration verschiedener Entwickler und Nachverfolgung von every Aenderung. Es ist de-faktisher Standard in der Softwareentwicklung."},
{frage:"Was ist GitHub?",antworten:["Plattform zum Verwalten und Teilen von Code-Repositories","Ein Browser","Ein Antivirenprogramm","Ein Server"],richtig:0,erklaerung:"GitHub ist eine webbasierte Plattform fuer Git-Repositories. Sie ermoeglicht Teamarbeit an Code, fuegt Issue-Tracking und Projektverwaltung hinzu. Sie ist weltweit eine der groessten Entwicklerplattformen."},
{frage:"Was ist ein Repository bei Git?",antworten:["Ein Verzeichnisbaum, der Versionskontrollinformationen enthaelt","Ein Backup-Server","Ein Antivirenprogramm","Ein Browser"],richtig:0,erklaerung:"Ein Repo (Repository) ist ein Projektarchiv in Git. Es enthaelt alle Dateien, Versionen und die Verlaufshistorie. Es kann lokal oder remote (z.B. auf GitHub) liegen und gespiegelt werden."},
{frage:"Was bedeutet 'Commit' in Git?",antworten:["Speichern einer Aenderungsmenge mit Beschreibung","Loeschen einer Datei","Kopieren eines Projekts","Pushen ins Internet"],richtig:0,erklaerung:"Ein Commit speichert eine Aenderung als versione in der Historie. Mit einer Commit-Message wird beschrieben, was geaendert wurde. Spueter kann man alte Versionen einsehen oder zurueckkehren."},
{frage:"Was bedeutet 'Push' in Git?",antworten:["Hochladen von lokalen Commits ins entfernte Repo","Loeschen eines Commits","Oeffnen eines Browsers","Erstellen einer Datei"],richtig:0,erklaerung:"git push laedt die eigenen Commits ins entfernte Repo (z.B. nach GitHub) hoch. Umgekehrt holt 'git pull' die Aenderungen anderer vom Server. 'git fetch' laedt nur herunter, ohne zu mergen."},
{frage:"Was ist ein Branch in Git?",antworten:["Ein Server","Eine parallele Version des Codes fuer getrennte Arbeit","Ein Antivirenprogramm","Ein Browser"],richtig:1,erklaerung:"Ein Branch ist eine parallele Entwicklungslinie. So koennen Teams an verschiedenen Features arbeiten, ohne sich zu stoeren. Spueter koennen Branches zusammengefuehrt werdfuehren (Merge). 'main' ist die Standardbranch."},
{frage:"Was ist ein Merge-Konflikt?",antworten:["Ein Virenscanner","Konflikt zweier Aenderungen am selben Bereich","Ein Backup-System","Ein Browser-Typ"],richtig:1,erklaerung:"Ein Merge-Konflikt entsteht, wenn zwei Aenderungen an derselben Stelle im Code stattfanden. Der Benuer muss ihn manuell loesen und sich fuer eine Version entscheiden. Moderne IDEs helfen dabei."}
];

let aktuelleFrage = 0;
let punkte = 0;
let beantwortet = false;

function zeigeFrage() {
    let q = fragen[aktuelleFrage];
    document.getElementById("frageNummer").innerHTML = "Frage " + (aktuelleFrage + 1) + " von " + fragen.length;
    document.getElementById("frage").innerHTML = q.frage;

    let ausgabe = "";
    q.antworten.forEach((antwort, index) => {
        ausgabe += '<label class="antwort"><input type="radio" name="antwort" value="' + index + '">' + antwort + '</label>';
    });
    document.getElementById("antworten").innerHTML = ausgabe;
    document.getElementById("ergebnis").innerHTML = "";
    document.getElementById("ergebnis").className = "";
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("balken").style.width = ((aktuelleFrage / fragen.length) * 100) + "%";
    beantwortet = false;
}

function pruefen() {
    if (beantwortet) return;
    let auswahl = document.querySelector('input[name="antwort"]:checked');
    let ergebnis = document.getElementById("ergebnis");

    if (!auswahl) {
        ergebnis.className = "falsch";
        ergebnis.innerHTML = "Bitte zuerst eine Antwort auswaehlen.";
        return;
    }

    beantwortet = true;

    if (Number(auswahl.value) === fragen[aktuelleFrage].richtig) {
        punkte++;
        ergebnis.className = "richtig";
        ergebnis.innerHTML = "Richtig! " + fragen[aktuelleFrage].erklaerung;
    } else {
        ergebnis.className = "falsch";
        ergebnis.innerHTML = "Falsch! " + fragen[aktuelleFrage].erklaerung;
    }

    document.getElementById("next-btn").style.display = "inline-block";
}

function naechsteFrage() {
    aktuelleFrage++;
    if (aktuelleFrage < fragen.length) {
        zeigeFrage();
    } else {
        document.querySelector(".quiz-container").innerHTML =
            '<div id="ende">' +
            '<h1>Quiz beendet!</h1>' +
            '<h2>Dein Ergebnis</h2>' +
            '<h3>' + punkte + ' von ' + fragen.length + ' richtig</h3>' +
            '<h2>' + Math.round((punkte / fragen.length) * 100) + '%</h2>' +
            '<button class="quiz-btn" onclick="location.reload()">Quiz neu starten</button>' +
            '<a href="index.html" class="quiz-link">Zurueck zur Startseite</a>' +
            '</div>';
    }
}

document.getElementById('quiz-music').addEventListener('click', function() {
    var btn = document.getElementById('quiz-music');
    var audio = document.getElementById('bg-music');
    if (audio.paused) {
        audio.volume = 0.9;
        audio.play().catch(function(error) {
            console.log("Autoplay blockiert:", error);
        });
        btn.textContent = 'Musik pausieren';
    } else {
        audio.pause();
        btn.textContent = 'Musik starten';
    }
});

zeigeFrage();
</script>
