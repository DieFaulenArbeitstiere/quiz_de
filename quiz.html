let aktuelleFrage = 0;
let punkte = 0;
let beantwortet = false;

function zeigeFrage() {
    let q = fragen[aktuelleFrage];
    document.getElementById("frageNummer").innerHTML = "Frage " + (aktuelleFrage + 1) + " von " + fragen.length;
    document.getElementById("frage").innerHTML = q.frage;

    let ausgabe = "";
    q.antworten.forEach((antwort, index) => {
        ausgabe += '<label class="antwort"><input type="radio" name="antwort" value="' + index + '">' + antwort + '</label>';
    });
    document.getElementById("antworten").innerHTML = ausgabe;
    document.getElementById("ergebnis").innerHTML = "";
    document.getElementById("ergebnis").className = "";
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("balken").style.width = ((aktuelleFrage / fragen.length) * 100) + "%";
    beantwortet = false;
}

function pruefen() {
    if (beantwortet) return;
    let auswahl = document.querySelector('input[name="antwort"]:checked');
    let ergebnis = document.getElementById("ergebnis");

    if (!auswahl) {
        ergebnis.className = "falsch";
        ergebnis.innerHTML = "Bitte zuerst eine Antwort auswaehlen.";
        return;
    }

    beantwortet = true;

    if (Number(auswahl.value) === fragen[aktuelleFrage].richtig) {
        punkte++;
        ergebnis.className = "richtig";
        ergebnis.innerHTML = "Richtig! " + fragen[aktuelleFrage].erklaerung;
    } else {
        ergebnis.className = "falsch";
        ergebnis.innerHTML = "Falsch! " + fragen[aktuelleFrage].erklaerung;
    }

    document.getElementById("next-btn").style.display = "inline-block";
}

function naechsteFrage() {
    aktuelleFrage++;
    if (aktuelleFrage < fragen.length) {
        zeigeFrage();
    } else {
        document.querySelector(".quiz-container").innerHTML =
            '<div id="ende">' +
            '<h1>Quiz beendet!</h1>' +
            '<h2>Dein Ergebnis</h2>' +
            '<h3>' + punkte + ' von ' + fragen.length + ' richtig</h3>' +
            '<h2>' + Math.round((punkte / fragen.length) * 100) + '%</h2>' +
            '<button class="quiz-btn" onclick="location.reload()">Quiz neu starten</button>' +
            '<a href="index.html" class="quiz-link">Zurueck zur Startseite</a>' +
            '</div>';
    }
}

document.getElementById('quiz-music').addEventListener('click', function() {
    var btn = document.getElementById('quiz-music');
    var audio = document.getElementById('bg-music');
    if (audio.paused) {
        audio.volume = 0.9;
        audio.play().catch(function(error) {
            console.log("Autoplay blockiert:", error);
        });
        btn.textContent = 'Musik pausieren';
    } else {
        audio.pause();
        btn.textContent = 'Musik starten';
    }
});

zeigeFrage();
</script>

</body>
</html>
